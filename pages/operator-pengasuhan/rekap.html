<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rekap Pelanggaran Bahasa - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9;
      --gold: #d4a843; --gold-light: #fdf6e3;
      --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5;
      --gray-200: #e0e0e0; --gray-400: #9e9e9e; --gray-600: #616161;
      --gray-800: #333333; --red: #e53935; --red-light: #fce4ec;
      --sidebar-width: 260px;
      --radius-sm: 8px; --radius: 12px; --transition: all 0.25s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); display: flex; min-height: 100vh; }

    .sidebar { width: var(--sidebar-width); background: var(--green-dark); color: white; height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 100; }
    .sidebar-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
    .sidebar-logo { width: 40px; height: 40px; background: var(--gold); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--green-dark); font-size: 18px; flex-shrink: 0; }
    .sidebar-brand h2 { font-size: 16px; font-weight: 700; color: white; }
    .sidebar-brand span { font-size: 10px; color: rgba(255,255,255,0.6); }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 16px 12px; }
    .nav-section { margin-bottom: 8px; }
    .nav-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); padding: 12px 12px 8px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; font-weight: 500; transition: var(--transition); margin-bottom: 2px; cursor: pointer; }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: var(--gold); font-weight: 600; }
    .nav-item i { width: 20px; text-align: center; font-size: 14px; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 36px; height: 36px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--green-dark); font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .user-info-sidebar .name { font-size: 13px; font-weight: 600; color: white; }
    .user-info-sidebar .role { font-size: 10px; color: rgba(255,255,255,0.5); }

    .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 28px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-title h1 { font-size: 22px; font-weight: 700; color: var(--gray-800); }
    .page-title p { font-size: 13px; color: var(--gray-600); margin-top: 2px; }
    .btn { padding: 9px 16px; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: var(--transition); white-space: nowrap; }
    .btn-success { background: var(--green); color: white; } .btn-success:hover { background: #008c4a; }
    .btn-outline { background: var(--white); border: 1.5px solid var(--gray-200); color: var(--gray-600); }

    .action-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200); margin-bottom: 20px; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .card-header h3 { font-size: 14px; font-weight: 700; color: var(--gray-800); display: flex; align-items: center; gap: 8px; }
    .card-body { padding: 20px; overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { background: var(--gray-100); padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 700; color: var(--gray-600); text-transform: uppercase; border-bottom: 2px solid var(--gray-200); white-space: nowrap; }
    tbody td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); }
    tbody tr:hover { background: var(--gray-50); }

    @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; padding: 16px 12px; } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><i class="fa-solid fa-graduation-cap"></i></div>
      <div class="sidebar-brand"><h2>IPIM Panel</h2><span>Operator Bahasa</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section"><div class="nav-section-title">Utama</div>
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-grid-2"></i> Home</a>
        <a href="rekap.html" class="nav-item active"><i class="fa-solid fa-list"></i> Rekap Pelanggaran</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-avatar" id="avatarLetter">A</div>
      <div class="user-info-sidebar"><div class="name" id="sidebarName">Operator</div><div class="role">Bahasa</div></div>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div class="page-title"><h1>📋 Rekap Pelanggaran Bahasa</h1><p>Semua laporan pelanggaran bahasa</p></div>
      <button class="btn btn-outline" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>

    <div class="action-bar">
      <button class="btn btn-success btn-sm" onclick="exportCSV()"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
      <input type="text" id="searchInput" placeholder="🔍 Cari..." style="padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:12px;margin-left:auto;max-width:200px;" onkeyup="filterTable()">
    </div>

    <div class="card">
      <div class="card-header"><h3><i class="fa-solid fa-list"></i> Daftar Laporan (<span id="totalData">0</span>)</h3></div>
      <div class="card-body" id="tableContainer"><p style="text-align:center;color:var(--gray-400);">Memuat data...</p></div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['operator-pengasuhan', 'pusat-data']);
    if (!user) window.location.href = '../../index.html';
    document.getElementById('sidebarName').textContent = user.nama || 'Operator';
    document.getElementById('avatarLetter').textContent = (user.nama || 'A').charAt(0).toUpperCase();

    let allData = [];

    async function loadData() {
      try {
        const snap = await db.collection('laporPengasuhan').get();
        allData = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.tanggal||'').localeCompare(a.tanggal||''));
        document.getElementById('totalData').textContent = allData.length;
        renderTable(allData);
      } catch(e) { console.error(e); }
    }

    function renderTable(data) {
      let html = '<table><thead><tr><th>No</th><th>Tanggal</th><th>Pelapor</th><th>Jenis</th><th>Deskripsi</th></tr></thead><tbody>';
      if (data.length === 0) html += '<tr><td colspan="5" style="text-align:center;">Tidak ada data</td></tr>';
      else data.forEach((d,i) => { html += `<tr><td>${i+1}</td><td>${d.tanggal||'-'}</td><td>${d.namaPelapor||'-'}</td><td>${d.jenis||'-'}</td><td>${d.deskripsi||'-'}</td></tr>`; });
      html += '</tbody></table>';
      document.getElementById('tableContainer').innerHTML = html;
    }

    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderTable(allData.filter(d => JSON.stringify(d).toLowerCase().includes(q)));
    }

    function exportCSV() {
      if (allData.length === 0) { alert('Tidak ada data!'); return; }
      let csv = 'Tanggal,Pelapor,Jenis,Deskripsi\n';
      allData.forEach(d => { csv += `"${d.tanggal||''}","${d.namaPelapor||''}","${d.jenis||''}","${d.deskripsi||''}"\n`; });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'rekap-bahasa.csv'; a.click();
    }

    window.logout = function() { if (confirm('Keluar?')) { auth.signOut().then(() => { localStorage.removeItem('user'); window.location.href = '../../index.html'; }); } };
    loadData();
  </script>
</body>
</html>
