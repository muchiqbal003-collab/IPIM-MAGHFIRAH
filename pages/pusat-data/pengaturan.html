<!-- GANTI bagian script di bawah dengan ini -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- ⭐ PERBAIKAN: Gunakan absolute path dari root -->
<script src="/js/firebase-config.js"></script>
<script src="/js/app.js"></script>
<script src="/js/lang.js"></script>

<script>
// ⭐ TAMBAHKAN: Debug untuk cek koneksi
console.log('🔥 Pengaturan page loaded');
console.log('Firebase apps:', firebase.apps.length);

// Cek auth state
auth.onAuthStateChanged(user => {
  if (!user) {
    console.warn('No user logged in');
    window.location.href = '../../index.html';
  } else {
    console.log('User logged in:', user.uid);
  }
});

// Cek koneksi Firestore
db.collection('pengaturan').doc('app').get()
  .then(doc => {
    console.log('📦 Firestore connected, data exists:', doc.exists);
  })
  .catch(err => {
    console.error('❌ Firestore error:', err);
  });

// ============================================
// ⭐ PERBAIKAN: Tambahkan fungsi untuk refresh dashboard
// ============================================
function refreshDashboard() {
  // Trigger reload di dashboard user
  localStorage.setItem('refreshDashboard', Date.now().toString());
  showToast('✅ Data berhasil disimpan! Dashboard akan refresh otomatis.', 'success');
}

// ============================================
// ⭐ PERBAIKAN: Fungsi simpan dengan notifikasi ke dashboard
// ============================================

// ── SIMPAN TAMPILAN ──
window.simpanTampilan = async function() {
  const btn = document.getElementById('btnSimpanTampilan');
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...';
  try {
    await db.collection('pengaturan').doc('app').set({
      logoUrl    : document.getElementById('logoUrl').value.trim(),
      bgHeaderUrl: document.getElementById('bgHeaderUrl').value.trim(),
      updatedAt  : firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    showToast('✅ Tampilan berhasil disimpan!', 'success');
    refreshDashboard();
  } catch(e) { showToast('❌ Gagal: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-save"></i> Simpan Tampilan'; }
};

// ── SIMPAN MOTIVASI ──
window.simpanMotivasi = async function() {
  const btn = document.getElementById('btnSimpanMotiv');
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...';
  try {
    await db.collection('pengaturan').doc('app').set({
      motivasi: motivasiData,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    showToast('✅ Motivasi berhasil disimpan!', 'success');
    refreshDashboard();
  } catch(e) { showToast('❌ Gagal: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-save"></i> Simpan Motivasi'; }
};

// ── SIMPAN VISI ──
window.simpanVisi = async function() {
  const visi = document.getElementById('visiTeks').value.trim();
  if (!visi) { showToast('Visi tidak boleh kosong', 'error'); return; }
  const btn = document.getElementById('btnSimpanVisi');
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...';
  try {
    await db.collection('pengaturan').doc('app').set({
      visi: visi,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    showToast('✅ Visi berhasil disimpan!', 'success');
    refreshDashboard();
  } catch(e) { showToast('❌ Gagal: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-save"></i> Simpan Visi'; }
};

// ── SIMPAN MISI ──
window.simpanMisi = async function() {
  const btn = document.getElementById('btnSimpanMisi');
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...';
  try {
    await db.collection('pengaturan').doc('app').set({
      misi: misiData,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    showToast('✅ Misi berhasil disimpan!', 'success');
    refreshDashboard();
  } catch(e) { showToast('❌ Gagal: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-save"></i> Simpan Misi'; }
};

// ── SIMPAN YOUTUBE ──
window.simpanYoutube = async function() {
  const btn = document.getElementById('btnSimpanYt');
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...';
  try {
    await db.collection('pengaturan').doc('app').set({
      youtube: youtubeData,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    showToast('✅ Video berhasil disimpan!', 'success');
    refreshDashboard();
  } catch(e) { showToast('❌ Gagal: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-save"></i> Simpan Video'; }
};

// ── SIMPAN PENGUMUMAN ──
window.simpanPengumuman = async function() {
  const btn = document.getElementById('btnSimpanPengumuman');
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...';
  try {
    await db.collection('pengaturan').doc('app').set({
      pengumumanJudul  : document.getElementById('pengumumanJudul').value.trim(),
      pengumumanIsi    : document.getElementById('pengumumanIsi').value.trim(),
      pengumumanWarna  : document.getElementById('pengumumanWarna').value,
      pengumumanExpired: document.getElementById('pengumumanExpired').value || null,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    showToast('✅ Pengumuman berhasil disimpan!', 'success');
    refreshDashboard();
  } catch(e) { showToast('❌ Gagal: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-save"></i> Simpan Pengumuman'; }
};

// ── HAPUS PENGUMUMAN ──
window.hapusPengumuman = async function() {
  if (!confirm('Hapus pengumuman dari dashboard?')) return;
  try {
    await db.collection('pengaturan').doc('app').set({
      pengumumanJudul: '',
      pengumumanIsi: '',
      pengumumanExpired: null,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    document.getElementById('pengumumanJudul').value = '';
    document.getElementById('pengumumanIsi').value = '';
    document.getElementById('pengumumanExpired').value = '';
    showToast('Pengumuman dihapus', 'success');
    refreshDashboard();
  } catch(e) { showToast('❌ Gagal: ' + e.message, 'error'); }
};

// ============================================
// ⭐ TAMBAHKAN: Listener untuk refresh otomatis
// ============================================
// Dengarkan perubahan dari halaman lain
window.addEventListener('storage', function(e) {
  if (e.key === 'refreshDashboard') {
    console.log('🔄 Dashboard refresh triggered');
    loadData(); // Reload data
  }
});

// ============================================
// ⭐ PERBAIKAN: Fungsi loadData dengan error handling lebih baik
// ============================================
async function loadData() {
  try {
    console.log('📥 Loading data from Firestore...');
    const doc = await db.collection('pengaturan').doc('app').get();
    const data = doc.exists ? doc.data() : {};
    
    console.log('📦 Data loaded:', data);

    // Tampilan
    if (data.logoUrl) {
      document.getElementById('logoUrl').value = data.logoUrl;
      document.getElementById('logoPreview').src = data.logoUrl;
      document.getElementById('logoPreview').style.display = 'block';
    }
    if (data.bgHeaderUrl) {
      document.getElementById('bgHeaderUrl').value = data.bgHeaderUrl;
      document.getElementById('bgHeaderPreview').src = data.bgHeaderUrl;
      document.getElementById('bgHeaderPreview').style.display = 'block';
    }

    // Motivasi — support berbagai format
    if (data.motivasi?.length) {
      motivasiData = data.motivasi;
    } else if (data.artikelMotivasi?.length) {
      motivasiData = data.artikelMotivasi.map(m => typeof m === 'string' ? { teks: m, sumber: '' } : m);
    } else if (data.motivasiList?.length) {
      motivasiData = data.motivasiList.map(m => typeof m === 'string' ? { teks: m, sumber: '' } : m);
    } else {
      motivasiData = [];
    }

    // Visi
    if (data.visi) document.getElementById('visiTeks').value = data.visi;
    else {
      // Set default visi
      document.getElementById('visiTeks').value = 'Menjadi kawasan percontohan dan rujukan pendidikan Islam terpadu yang mencetak generasi rabbani, berakhlak mulia, berwawasan luas, dan siap menjadi pemimpin peradaban.';
    }

    // Misi
    if (data.misi?.length) {
      misiData = data.misi;
    } else {
      // Default misi
      misiData = [
        { judul: 'Pendidikan Holistik', teks: 'Menyelenggarakan pendidikan Islam dari usia anak-anak hingga lanjut usia menggunakan pendekatan hati (keteladanan) ala Rasulullah.' },
        { judul: 'Unggul Akademik & Agama', teks: 'Memadukan kurikulum internasional, nasional, dan kepesantrenan untuk melahirkan generasi yang cerdas akalnya dan kuat agamanya.' },
        { judul: 'Penguasaan Bahasa', teks: 'Membiasakan penggunaan Bahasa Arab dan Bahasa Inggris secara aktif dalam komunikasi dan public speaking.' },
        { judul: 'Berjiwa Qur\'ani & Bersanad', teks: 'Mencetak penghafal Al-Qur\'an (hafizh) dengan sanad keilmuan yang jelas.' },
        { judul: 'Kemandirian', teks: 'Menumbuhkan kepribadian yang mandiri serta penerapan sunah Rasulullah dalam kehidupan sehari-hari.' }
      ];
    }

    // YouTube
    youtubeData = data.youtube || [];

    // Pengumuman
    if (data.pengumumanJudul) document.getElementById('pengumumanJudul').value = data.pengumumanJudul;
    if (data.pengumumanIsi) document.getElementById('pengumumanIsi').value = data.pengumumanIsi;
    if (data.pengumumanWarna) document.getElementById('pengumumanWarna').value = data.pengumumanWarna;
    if (data.pengumumanExpired) document.getElementById('pengumumanExpired').value = data.pengumumanExpired;

    renderMotivasi();
    renderMisi();
    renderYoutube();
    
    console.log('✅ Data loaded successfully');
  } catch(e) {
    console.error('❌ Error loading data:', e);
    showAlert('error', 'Gagal memuat data: ' + e.message);
  }
}

// Rest of your code...
// (renderMotivasi, renderMisi, renderYoutube, etc. tetap sama)

// Load data saat halaman dimuat
loadData();
</script>
