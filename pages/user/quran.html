<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>IPIM - Al-Qur'an</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --green-dark: #003d33; --green-mid: #006644; --green: #00a859;
      --green-light: #e8f5e9; --green-pale: #f0faf5;
      --gold: #f5c842; --gold-light: #fffbee;
      --white: #ffffff; --gray-100: #f0f0f0; --gray-200: #d1ead8;
      --gray-600: #666666; --gray-800: #222222;
      --radius-sm: 10px; --radius: 14px; --radius-lg: 18px;
      --transition: all 0.3s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--green-pale); color: var(--gray-800);
      padding-bottom: 30px;
    }

    .topbar {
      background: linear-gradient(135deg, #003d33 0%, #006644 100%);
      color: white; padding: 14px 16px 16px;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 4px 16px rgba(0,61,51,0.25);
    }
    .topbar-row { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18);
      color: white; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; flex-shrink: 0;
    }
    .topbar-title { font-size: 16px; font-weight: 700; }
    .topbar-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }
    .search-bar { margin-top: 12px; }
    .search-input {
      width: 100%; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px; padding: 9px 14px; color: white; font-size: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.6); }

    .main { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    .tilawah-card {
      background: var(--white); border-radius: var(--radius-lg); padding: 14px;
      border: 0.5px solid var(--gray-200); display: flex; gap: 12px; align-items: center;
    }
    .tilawah-stats { display: flex; gap: 8px; flex: 1; }
    .ts-box { flex: 1; background: var(--green-pale); border-radius: 10px; padding: 10px; text-align: center; border: 0.5px solid #c8e6d4; }
    .ts-val { font-size: 18px; font-weight: 800; color: var(--green-dark); }
    .ts-lbl { font-size: 9px; color: var(--gray-600); margin-top: 2px; }

    .lanjut-card {
      background: linear-gradient(135deg, #006644, #00a859); border-radius: var(--radius-lg);
      padding: 14px; color: white; display: flex; align-items: center; gap: 12px; cursor: pointer;
    }
    .lanjut-icon { width: 44px; height: 44px; background: rgba(255,255,255,0.18); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .lanjut-info { flex: 1; }
    .lanjut-lbl { font-size: 11px; opacity: 0.85; }
    .lanjut-name { font-size: 14px; font-weight: 700; margin-top: 2px; }

    .offline-banner { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: #e6f1fb; border-radius: 10px; font-size: 11px; color: #0c447c; }

    .surat-list { display: flex; flex-direction: column; gap: 8px; }
    .surat-item {
      background: var(--white); border-radius: var(--radius-sm); padding: 12px 14px;
      border: 0.5px solid var(--gray-200); display: flex; align-items: center; gap: 12px; cursor: pointer;
    }
    .surat-num { width: 34px; height: 34px; border-radius: 8px; background: var(--green-light); color: var(--green-mid); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .surat-meta { flex: 1; }
    .surat-name { font-size: 13px; font-weight: 700; color: var(--gray-800); }
    .surat-sub { font-size: 10.5px; color: var(--gray-600); margin-top: 1px; }
    .surat-arab { font-family: 'Amiri', serif; font-size: 18px; color: var(--green-dark); }
    .surat-download { font-size: 13px; color: var(--gray-600); }
    .surat-download.cached { color: var(--green); }

    .reader-view { display: none; flex-direction: column; gap: 0; }
    .reader-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
    .reader-back { font-size: 12px; color: var(--green-mid); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .reader-title { font-size: 14px; font-weight: 700; color: var(--green-dark); }
    .ayat-item {
      background: var(--white); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px;
      border: 0.5px solid var(--gray-200);
    }
    .ayat-item.read { border-color: var(--green); background: var(--green-pale); }
    .ayat-num-badge { font-size: 10px; color: var(--green-mid); font-weight: 700; background: var(--green-light); padding: 3px 9px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
    .ayat-arab { font-family: 'Amiri', serif; font-size: 22px; line-height: 2.1; text-align: right; direction: rtl; color: var(--green-dark); margin-bottom: 10px; }
    .ayat-latin { font-size: 11.5px; color: var(--green-mid); font-style: italic; line-height: 1.6; margin-bottom: 6px; }
    .ayat-arti { font-size: 12px; color: var(--gray-600); line-height: 1.6; }

    .loading-state, .empty-state { text-align: center; padding: 30px 16px; color: var(--gray-600); font-size: 12px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-row">
      <div class="back-btn" onclick="goTo('dashboard.html')"><i class="fa-solid fa-arrow-left"></i></div>
      <div>
        <div class="topbar-title"><i class="fa-solid fa-book-quran"></i> Al-Qur'an</div>
        <div class="topbar-sub">114 Surat &middot; Tersimpan offline</div>
      </div>
    </div>
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="Cari nama surat...">
    </div>
  </div>

  <div class="main">

    <div id="listView">
      <div class="tilawah-card">
        <div class="tilawah-stats">
          <div class="ts-box"><div class="ts-val" id="halamanHariIni">0</div><div class="ts-lbl">Halaman Hari Ini</div></div>
          <div class="ts-box"><div class="ts-val" id="juzSelesai">0/30</div><div class="ts-lbl">Juz Selesai</div></div>
        </div>
      </div>

      <div class="lanjut-card" id="lanjutCard" style="display:none;" onclick="lanjutkanBaca()">
        <div class="lanjut-icon"><i class="fa-solid fa-book-open"></i></div>
        <div class="lanjut-info">
          <div class="lanjut-lbl">Lanjutkan Tilawah</div>
          <div class="lanjut-name" id="lanjutNama">-</div>
        </div>
        <i class="fa-solid fa-chevron-right"></i>
      </div>

      <div class="offline-banner"><i class="fa-solid fa-circle-check"></i> Surat yang sudah dibuka otomatis tersimpan offline</div>

      <div class="surat-list" id="suratList">
        <div class="loading-state"><i class="fa-solid fa-circle-notch fa-spin"></i> Memuat daftar surat...</div>
      </div>
    </div>

    <div id="readerView" class="reader-view">
      <div class="reader-header">
        <div class="reader-back" onclick="closeReader()"><i class="fa-solid fa-arrow-left"></i> Daftar Surat</div>
        <div class="reader-title" id="readerTitle"></div>
      </div>
      <div id="ayatContainer"></div>
    </div>

  </div>

  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['dosen', 'musyrif', 'dosen-musyrif', 'umum']);
    if (!user) window.location.href = '../../index.html';
    window.goTo = page => window.location.href = page;

    const DB_NAME = 'IPIM_QuranDB';
    const STORE_NAME = 'surat';
    let idb = null;
    let allSuratList = [];
    let currentSurat = null;
    let readTimers = {};

    function openIDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'nomor' });
          }
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e);
      });
    }

    function idbGet(nomor) {
      return new Promise((resolve) => {
        if (!idb) return resolve(null);
        const tx = idb.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const req = store.get(nomor);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
      });
    }

    function idbSet(nomor, data) {
      return new Promise((resolve) => {
        if (!idb) return resolve(false);
        const tx = idb.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put({ nomor, data, cachedAt: Date.now() });
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => resolve(false);
      });
    }

    async function idbHas(nomor) {
      const result = await idbGet(nomor);
      return !!result;
    }

    async function fetchSuratList() {
      const cacheKey = 'quranSuratList';
      try {
        const cached = localStorage.getItem(cacheKey);
        if (cached) return JSON.parse(cached);
      } catch(e) {}

      const res = await fetch('https://equran.id/api/v2/surat');
      const json = await res.json();
      const list = json.data || json;
      try { localStorage.setItem(cacheKey, JSON.stringify(list)); } catch(e) {}
      return list;
    }

    async function fetchSuratDetail(nomor) {
      const cached = await idbGet(nomor);
      if (cached) return cached.data;

      const res = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
      const json = await res.json();
      const data = json.data || json;
      await idbSet(nomor, data);
      return data;
    }

    function getTilawahProgress() {
      try {
        const saved = localStorage.getItem(`tilawahProgress_${user.uid}`);
        return saved ? JSON.parse(saved) : { halamanDibaca: {}, terakhir: null, totalHalamanSemua: 0 };
      } catch(e) {
        return { halamanDibaca: {}, terakhir: null, totalHalamanSemua: 0 };
      }
    }

    function saveTilawahProgress(progress) {
      try { localStorage.setItem(`tilawahProgress_${user.uid}`, JSON.stringify(progress)); } catch(e) {}
      syncTilawahToFirestore(progress);
    }

    let tilawahSyncTimeout = null;
    function syncTilawahToFirestore(progress) {
      clearTimeout(tilawahSyncTimeout);
      tilawahSyncTimeout = setTimeout(async () => {
        try {
          const todayKey = new Date().toISOString().split('T')[0];
          const todayHalaman = progress.halamanDibaca[todayKey] || [];
          await db.collection('tilawahLog').doc(`${user.uid}_${todayKey}`).set({
            userId: user.uid,
            tanggal: todayKey,
            jumlahHalaman: todayHalaman.length,
            terakhirSurat: progress.terakhir?.namaSurat || null,
            terakhirAyat: progress.terakhir?.ayat || null,
            updatedAt: new Date().toISOString()
          }, { merge: true });
        } catch(e) { console.error('Gagal sync tilawah', e); }
      }, 2000);
    }

    function updateTilawahStats() {
      const progress = getTilawahProgress();
      const todayKey = new Date().toISOString().split('T')[0];
      const todayHalaman = progress.halamanDibaca[todayKey] || [];
      document.getElementById('halamanHariIni').textContent = todayHalaman.length;

      const totalHalamanUnik = new Set();
      Object.values(progress.halamanDibaca).forEach(arr => arr.forEach(h => totalHalamanUnik.add(h)));
      const estimasiJuz = Math.min(30, Math.floor(totalHalamanUnik.size / 20));
      document.getElementById('juzSelesai').textContent = `${estimasiJuz}/30`;

      if (progress.terakhir) {
        document.getElementById('lanjutCard').style.display = 'flex';
        document.getElementById('lanjutNama').textContent = `${progress.terakhir.namaSurat} ayat ${progress.terakhir.ayat}`;
      }
    }

    function lanjutkanBaca() {
      const progress = getTilawahProgress();
      if (progress.terakhir) openSurat(progress.terakhir.nomorSurat, progress.terakhir.ayat);
    }

    async function renderSuratList(filter = '') {
      const container = document.getElementById('suratList');
      const filtered = allSuratList.filter(s => {
        const nama = (s.namaLatin || s.nama_latin || s.nama || '').toLowerCase();
        return nama.includes(filter.toLowerCase());
      });

      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state">Surat tidak ditemukan</div>';
        return;
      }

      const rows = await Promise.all(filtered.map(async (s) => {
        const nomor = s.nomor;
        const isCached = await idbHas(nomor);
        return `
          <div class="surat-item" onclick="openSurat(${nomor})">
            <div class="surat-num">${nomor}</div>
            <div class="surat-meta">
              <div class="surat-name">${s.namaLatin || s.nama_latin}</div>
              <div class="surat-sub">${s.tempatTurun || s.tempat_turun || ''} &middot; ${s.jumlahAyat || s.jumlah_ayat} ayat</div>
            </div>
            <div class="surat-arab">${s.nama}</div>
            <div class="surat-download ${isCached ? 'cached' : ''}">
              <i class="fa-solid ${isCached ? 'fa-circle-check' : 'fa-cloud-arrow-down'}"></i>
            </div>
          </div>`;
      }));

      container.innerHTML = rows.join('');
    }

    async function openSurat(nomor, scrollToAyat = null) {
      document.getElementById('listView').style.display = 'none';
      document.getElementById('readerView').style.display = 'flex';
      document.getElementById('ayatContainer').innerHTML = '<div class="loading-state"><i class="fa-solid fa-circle-notch fa-spin"></i> Memuat surat...</div>';

      try {
        const detail = await fetchSuratDetail(nomor);
        currentSurat = detail;
        document.getElementById('readerTitle').textContent = detail.namaLatin || detail.nama_latin;

        const ayatList = detail.ayat || [];
        document.getElementById('ayatContainer').innerHTML = ayatList.map(a => {
          const noAyat = a.nomorAyat || a.nomor_ayat;
          return `
          <div class="ayat-item" id="ayat_${nomor}_${noAyat}" data-surat="${nomor}" data-ayat="${noAyat}" data-nama="${detail.namaLatin || detail.nama_latin}">
            <div class="ayat-num-badge">Ayat ${noAyat}</div>
            <div class="ayat-arab">${a.teksArab || a.teks_arab}</div>
            <div class="ayat-latin">${a.teksLatin || a.teks_latin || ''}</div>
            <div class="ayat-arti">${a.teksIndonesia || a.teks_indonesia || ''}</div>
          </div>`;
        }).join('');

        setupReadingObserver();

        if (scrollToAyat) {
          setTimeout(() => {
            const el = document.getElementById(`ayat_${nomor}_${scrollToAyat}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 200);
        }
      } catch(e) {
        document.getElementById('ayatContainer').innerHTML = '<div class="empty-state">Gagal memuat surat. Periksa koneksi internet untuk membuka pertama kali.</div>';
      }
    }

    function closeReader() {
      document.getElementById('listView').style.display = 'block';
      document.getElementById('readerView').style.display = 'none';
      if (window.readingObserver) window.readingObserver.disconnect();
      renderSuratList(document.getElementById('searchInput').value);
      updateTilawahStats();
    }

    function setupReadingObserver() {
      if (window.readingObserver) window.readingObserver.disconnect();

      window.readingObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const el = entry.target;
          const key = el.id;
          if (entry.isIntersecting) {
            readTimers[key] = setTimeout(() => markAsRead(el), 3000);
          } else {
            if (readTimers[key]) {
              clearTimeout(readTimers[key]);
              delete readTimers[key];
            }
          }
        });
      }, { threshold: 0.6 });

      document.querySelectorAll('.ayat-item').forEach(el => window.readingObserver.observe(el));
    }

    function markAsRead(el) {
      if (el.classList.contains('read')) return;
      el.classList.add('read');

      const nomorSurat = parseInt(el.dataset.surat);
      const ayat = parseInt(el.dataset.ayat);
      const namaSurat = el.dataset.nama;

      const progress = getTilawahProgress();
      const todayKey = new Date().toISOString().split('T')[0];
      const halamanId = `${nomorSurat}_${Math.ceil(ayat / 15)}`;

      if (!progress.halamanDibaca[todayKey]) progress.halamanDibaca[todayKey] = [];
      if (!progress.halamanDibaca[todayKey].includes(halamanId)) {
        progress.halamanDibaca[todayKey].push(halamanId);
      }

      progress.terakhir = { nomorSurat, namaSurat, ayat };
      saveTilawahProgress(progress);
      updateTilawahStats();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderSuratList(e.target.value);
    });

    async function init() {
      idb = await openIDB();
      updateTilawahStats();
      try {
        allSuratList = await fetchSuratList();
        renderSuratList();
      } catch(e) {
        document.getElementById('suratList').innerHTML = '<div class="empty-state">Gagal memuat daftar surat. Periksa koneksi internet.</div>';
      }
    }

    init();
  </script>
</body>
</html>
