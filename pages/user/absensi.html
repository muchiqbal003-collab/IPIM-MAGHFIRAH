<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Absensi Sholat - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9; --gold: #d4a843; --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333; --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --transition: all 0.25s ease; --bottom-nav-height: 64px; --header-height: 56px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); padding-bottom: var(--bottom-nav-height); }
    .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
    .content { padding: 16px; }
    .card { background: var(--white); border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--gray-200); margin-bottom: 16px; }
    .sholat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
    .sholat-btn { padding: 16px 8px; text-align: center; border-radius: var(--radius-sm); border: 1.5px solid var(--gray-200); background: white; cursor: pointer; font-size: 11px; font-family: 'Poppins', sans-serif; }
    .sholat-btn i { display: block; font-size: 20px; margin-bottom: 4px; }
    .sholat-btn.active { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }
    .form-group { margin-bottom: 12px; }
    .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 13px; outline: none; }
    .btn-primary { width: 100%; padding: 12px; background: var(--green-dark); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; }
    .alert { padding: 12px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 12px; display: none; }
    .alert-success { background: var(--green-light); color: #1b5e20; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height); background: var(--white); border-top: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-around; z-index: 100; }
    .bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--gray-600); cursor: pointer; }
    .bottom-nav .nav-item i { font-size: 20px; }
    .bottom-nav .nav-item.active { color: var(--green-dark); font-weight: 600; }
  </style>
</head>
<body>

  <header class="app-header">
    <button class="btn-back" onclick="goTo('dashboard.html')"><i class="fa-solid fa-arrow-left"></i></button>
    <h3>Absensi Sholat</h3>
  </header>

  <div class="content">
    <div id="alertSuccess" class="alert alert-success"></div>
    <div class="card">
      <div class="sholat-grid" id="sholatGrid">
        <button class="sholat-btn" onclick="setSholat('subuh')"><i class="fa-solid fa-sun"></i>Subuh</button>
        <button class="sholat-btn" onclick="setSholat('dzuhur')"><i class="fa-solid fa-sun"></i>Dzuhur</button>
        <button class="sholat-btn" onclick="setSholat('ashar')"><i class="fa-solid fa-cloud-sun"></i>Ashar</button>
        <button class="sholat-btn" onclick="setSholat('maghrib')"><i class="fa-solid fa-cloud-moon"></i>Maghrib</button>
        <button class="sholat-btn" onclick="setSholat('isya')"><i class="fa-solid fa-moon"></i>Isya</button>
      </div>
      <div class="form-group"><label>Keterangan</label><select id="ketSholat"><option value="hadir">Hadir</option><option value="tidak">Tidak</option><option value="sakit">Sakit</option><option value="diluar izin">Diluar (Izin)</option><option value="diluar libur">Diluar (Libur)</option></select></div>
      <button class="btn-primary" onclick="simpanSholat()">Simpan Sholat</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item" onclick="goTo('dashboard.html')"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item active" onclick="goTo('absensi.html')"><i class="fa-solid fa-clipboard-check"></i><span>Absensi</span></div>
    <div class="nav-item" onclick="goTo('kalender.html')"><i class="fa-solid fa-calendar-days"></i><span>Kalender</span></div>
    <div class="nav-item" onclick="goTo('rekap.html')"><i class="fa-solid fa-chart-bar"></i><span>Rekap</span></div>
    <div class="nav-item" onclick="goTo('profil.html')"><i class="fa-solid fa-user"></i><span>Profil</span></div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['dosen', 'musyrif', 'dosen-musyrif', 'umum']);
    if (!user) window.location.href = '../../index.html';
    window.goTo = page => window.location.href = page;

    let selectedSholat = null;
    window.setSholat = waktu => {
      selectedSholat = waktu;
      document.querySelectorAll('.sholat-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[onclick="setSholat('${waktu}')"]`).classList.add('active');
    };

    window.simpanSholat = async () => {
      if (!selectedSholat) return alert('Pilih waktu sholat!');
      const ket = document.getElementById('ketSholat').value;
      const today = new Date().toISOString().split('T')[0];
      await db.collection('absensiSholat').add({
        userId: user.uid, nama: user.nama, waktu: selectedSholat, keterangan: ket, tanggal: today,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      const el = document.getElementById('alertSuccess');
      el.textContent = '✅ Sholat tercatat!';
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 1500);
    };
  </script>
</body>
</html>
