<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Rekap Nilai Matakuliah - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9; --gold: #d4a843; --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333; --radius-sm: 8px; --radius: 12px; --transition: all 0.25s ease; --header-height: 56px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); }
    .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
    .app-header h3 { font-size: 16px; font-weight: 600; }
    .content { padding: 16px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 16px; border: 1px solid var(--gray-200); margin-bottom: 16px; overflow-x: auto; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--gray-600); display: block; margin-bottom: 4px; }
    .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Poppins', sans-serif; outline: none; background: white; }
    .btn { padding: 8px 14px; border: none; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
    .btn-success { background: var(--green); color: white; }
    .btn-outline { background: var(--white); border: 1.5px solid var(--gray-200); color: var(--gray-600); }
    .action-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { background: var(--gray-100); padding: 8px 6px; text-align: center; font-size: 10px; font-weight: 700; color: var(--gray-600); border-bottom: 2px solid var(--gray-200); white-space: nowrap; }
    td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--gray-100); }
    .badge { padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600; }
    .badge-success { background: var(--green-light); color: #1b5e20; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-danger { background: #fce4ec; color: #b71c1c; }
  </style>
</head>
<body>

<header class="app-header">
  <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <h3>Rekap Nilai Matakuliah</h3>
</header>

<div class="content">
  <div class="card">
    <div class="form-group"><label>Pilih Matakuliah</label><select id="filterMatkul" onchange="loadRekap()"><option value="">Pilih Matakuliah...</option></select></div>
  </div>

  <div class="action-bar" id="actionBar" style="display:none;">
    <button class="btn btn-success" onclick="exportExcel()"><i class="fa-solid fa-file-excel"></i> Download Excel</button>
  </div>

  <div class="card" id="tableContainer"><p style="text-align:center;color:var(--gray-600);">Pilih matakuliah</p></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../../js/firebase-config.js"></script>
<script src="../../js/app.js"></script>
<script>
  const user = checkRole(['dosen', 'dosen-musyrif']);
  if (!user) window.location.href = '../../index.html';

  async function loadFilter() {
    const snap = await db.collection('jadwal').where('dosenId', '==', user.uid).get();
    const sel = document.getElementById('filterMatkul');
    const mkSet = new Map();
    snap.forEach(d => { const j = d.data(); if (!mkSet.has(j.mkId)) mkSet.set(j.mkId, j.mkNama); });
    mkSet.forEach((nama, id) => { const o = document.createElement('option'); o.value = id; o.textContent = nama; sel.appendChild(o); });
  }

  window.loadRekap = async function() {
    const mkId = document.getElementById('filterMatkul').value;
    if (!mkId) return;
    document.getElementById('actionBar').style.display = 'flex';
    const container = document.getElementById('tableContainer');
    try {
      const kompSnap = await db.collection('komponenNilai').where('mkId', '==', mkId).get();
      if (kompSnap.empty) {
        container.innerHTML = '<p style="text-align:center;color:var(--gray-600);">Belum ada komponen penilaian</p>';
        return;
      }
      const komponenList = kompSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const totalBobot = komponenList.reduce((s, k) => s + k.bobot, 0);
      const jadwalSnap = await db.collection('jadwal').where('mkId', '==', mkId).get();
      const kelasIds = new Set(jadwalSnap.docs.map(d => d.data().kelasId));
      let mhsList = [];
      for (const kId of kelasIds) {
        const mhsSnap = await db.collection('mahasiswa').where('kelasId', '==', kId).get();
        mhsList.push(...mhsSnap.docs.map(d => ({ id: d.id, ...d.data() })));
      }
      mhsList = [...new Map(mhsList.map(m => [m.id, m])).values()].sort((a,b) => (a.nama||'').localeCompare(b.nama||''));
      const komponenIds = komponenList.map(k => k.id);
      const nilaiSnap = await db.collection('nilaiMahasiswa').where('komponenId', 'in', komponenIds).get();
      const nilaiMap = {};
      nilaiSnap.forEach(d => { const n = d.data(); if (!nilaiMap[n.mahasiswaId]) nilaiMap[n.mahasiswaId] = {}; nilaiMap[n.mahasiswaId][n.komponenId] = n.nilai; });

      let html = '<table><thead><tr><th>No</th><th>NIM</th><th>Nama</th>';
      komponenList.forEach(k => html += `<th>${k.namaKomponen}<br><small>(${k.bobot}%)</small></th>`);
      html += '<th>Nilai Akhir</th><th>Grade</th></tr></thead><tbody>';

      if (mhsList.length === 0) { html += '<tr><td colspan="' + (komponenList.length + 4) + '">Tidak ada mahasiswa</td></tr>'; }
      else {
        mhsList.forEach((m, i) => {
          html += `<tr><td>${i+1}</td><td>${m.nim||'-'}</td><td style="text-align:left;">${m.nama}</td>`;
          let nilaiAkhir = 0;
          komponenList.forEach(k => {
            const n = nilaiMap[m.id]?.[k.id] || 0;
            html += `<td>${n||'-'}</td>`;
            if (totalBobot > 0) nilaiAkhir += (n * k.bobot) / totalBobot;
          });
          nilaiAkhir = Math.round(nilaiAkhir * 100) / 100;
          let grade = '-', badge = '';
          if (nilaiAkhir >= 85) { grade = 'A'; badge = 'badge-success'; }
          else if (nilaiAkhir >= 75) { grade = 'B'; badge = 'badge-success'; }
          else if (nilaiAkhir >= 65) { grade = 'C'; badge = 'badge-warning'; }
          else if (nilaiAkhir >= 50) { grade = 'D'; badge = 'badge-danger'; }
          else if (nilaiAkhir > 0) { grade = 'E'; badge = 'badge-danger'; }
          html += `<td><strong>${nilaiAkhir||'-'}</strong></td><td><span class="badge ${badge}">${grade}</span></td></tr>`;
        });
      }
      html += '</tbody></table>';
      container.innerHTML = html;
    } catch(e) { container.innerHTML = '<p style="color:red;">Gagal: ' + e.message + '</p>'; }
  };

  function exportExcel() {
    const table = document.querySelector('table');
    if (!table) return alert('Tidak ada data!');
    let csv = '\uFEFF';
    const rows = table.querySelectorAll('tr');
    rows.forEach(row => {
      const cols = row.querySelectorAll('th, td');
      const rowData = [];
      cols.forEach(col => { rowData.push(`"${col.textContent.replace(/"/g, '""')}"`); });
      csv += rowData.join(';') + '\n';
    });
    const blob = new Blob([csv], { type: 'application/vnd.ms-excel;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'rekap-nilai.xls';
    a.click(); URL.revokeObjectURL(url);
  }

  loadFilter();
</script>
</body>
</html>
