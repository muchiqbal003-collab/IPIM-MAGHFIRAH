<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Absensi Kelas - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9; --gold: #d4a843; --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333; --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --transition: all 0.25s ease; --header-height: 56px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); }
    .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
    .content { padding: 16px; }
    .card { background: var(--white); border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--gray-200); margin-bottom: 16px; }
    .santri-list { display: flex; flex-direction: column; gap: 8px; }
    .santri-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: var(--gray-50); border-radius: var(--radius-sm); }
    .status-btns { display: flex; gap: 4px; }
    .status-btn { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--gray-200); background: white; }
    .status-btn.sakit { color: #d97706; border-color: #fde68a; }
    .status-btn.izin { color: #2563eb; border-color: #bfdbfe; }
    .status-btn.alfa { color: #dc2626; border-color: #fecaca; }
    .status-btn.jaga { color: #7c3aed; border-color: #ddd6fe; }
    .status-btn.active { background: #d1fae5; border-color: #10b981; color: #065f46; }
    .status-btn.active.sakit { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
    .status-btn.active.izin { background: #dbeafe; border-color: #3b82f6; color: #1e40af; }
    .status-btn.active.alfa { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
    .status-btn.active.jaga { background: #ede9fe; border-color: #8b5cf6; color: #6d28d9; }
    .btn-primary { width: 100%; padding: 12px; background: var(--green-dark); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; margin-top: 16px; }
    .alert { padding: 12px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 12px; display: none; }
    .alert-success { background: var(--green-light); color: #1b5e20; }
  </style>
</head>
<body>

  <header class="app-header">
    <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <h3>Absensi Kelas</h3>
  </header>

  <div class="content">
    <div id="alertSuccess" class="alert alert-success"></div>
    <div class="card">
      <h4 id="infoKelas" style="margin-bottom:16px;">Memuat...</h4>
      <div class="santri-list" id="listKelas">Memuat data mahasiswa...</div>
      <button class="btn-primary" onclick="simpanAbsensi()">Simpan Absensi</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['dosen', 'dosen-musyrif']);
    if (!user) window.location.href = '../../index.html';

    const params = new URLSearchParams(window.location.search);
    const jadwalId = params.get('jadwalId');
    const kelasId = params.get('kelasId');
    const mapelId = params.get('mapelId');
    let absensiKelas = {};

    async function init() {
      if (!jadwalId || !kelasId || !mapelId) {
        alert('Parameter tidak lengkap');
        history.back();
        return;
      }
      try {
        const jDoc = await db.collection('jadwal').doc(jadwalId).get();
        if (jDoc.exists) {
          const j = jDoc.data();
          document.getElementById('infoKelas').textContent = `${j.mkNama} - ${j.kelasNama} (${j.waktu})`;
        }
        const mhsSnap = await db.collection('mahasiswa').where('kelasId', '==', kelasId).get();
        const docs = mhsSnap.docs.sort((a,b) => (a.data().nama||'').localeCompare(b.data().nama||''));
        let html = '';
        docs.forEach(d => {
          const mhs = d.data();
          absensiKelas[d.id] = 'hadir';
          html += `<div class="santri-row"><span>${mhs.nama}</span><div class="status-btns">${['sakit','izin','alfa','jaga'].map(s => `<button class="status-btn ${s}" id="btn-kelas-${d.id}-${s}" onclick="setStatus('${d.id}','${s}')">${s==='jaga'?'Jaga Malam':s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('')}</div></div>`;
        });
        document.getElementById('listKelas').innerHTML = html || 'Tidak ada mahasiswa';
      } catch(e) { console.error(e); }
    }

    window.setStatus = (id, status) => {
      absensiKelas[id] = status;
      ['sakit','izin','alfa','jaga'].forEach(s => {
        const btn = document.getElementById(`btn-kelas-${id}-${s}`);
        if (btn) { btn.classList.remove('active'); if (s === status) btn.classList.add('active'); }
      });
    };

    window.simpanAbsensi = async function() {
      const today = new Date().toISOString().split('T')[0];
      const batch = db.batch();
      for (const [mhsId, status] of Object.entries(absensiKelas)) {
        const ref = db.collection('absensi').doc();
        batch.set(ref, {
          mahasiswaId: mhsId, kelasId, mapelId, dosenId: user.uid,
          status, tanggal: today,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      await batch.commit();
      const el = document.getElementById('alertSuccess');
      el.textContent = '✅ Absensi berhasil disimpan!';
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; history.back(); }, 1500);
    };

    init();
  </script>
</body>
</html>
