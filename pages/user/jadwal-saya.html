<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jadwal Saya - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9;
      --gold: #d4a843; --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5;
      --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333;
      --radius-sm: 8px; --radius: 12px; --transition: all 0.25s ease;
      --header-height: 56px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); }
    .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
    .app-header h3 { font-size: 16px; font-weight: 600; }
    .content { padding: 16px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 16px; border: 1px solid var(--gray-200); margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }

    table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 600px; }
    thead th { background: var(--green-dark); color: white; padding: 10px 8px; text-align: center; font-size: 11px; font-weight: 600; border: 1px solid #003d33; white-space: nowrap; }
    thead th:first-child { width: 60px; }
    tbody td { padding: 10px 8px; text-align: center; border: 1px solid var(--gray-200); vertical-align: top; font-size: 11px; }
    tbody tr:nth-child(even) { background: var(--gray-50); }
    .cell-mapel { font-weight: 600; color: var(--green-dark); font-size: 11px; }
    .cell-kelas { font-size: 10px; color: var(--gray-600); }
    .cell-waktu { font-size: 10px; color: var(--gray-600); }
    .cell-kosong { color: var(--gray-400); font-style: italic; font-size: 10px; }
    .cell-jp { font-weight: 700; color: var(--green-dark); text-align: center; }

    @media (max-width: 480px) {
      .content { padding: 8px; }
      table { font-size: 10px; }
      thead th, tbody td { padding: 6px 4px; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <h3>Jadwal Saya</h3>
  </header>

  <div class="content">
    <div class="card" id="jadwalContainer">
      <p style="text-align:center;color:var(--gray-600);">Memuat jadwal...</p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['dosen', 'dosen-musyrif']);
    if (!user) window.location.href = '../../index.html';

    async function loadJadwal() {
      const container = document.getElementById('jadwalContainer');
      try {
        const snap = await db.collection('jadwal').where('dosenId', '==', user.uid).get();
        
        if (snap.empty) {
          container.innerHTML = '<p style="text-align:center;padding:30px;color:var(--gray-600);">Belum ada jadwal mengajar</p>';
          return;
        }

        const jadwalData = snap.docs.map(d => d.data());

        // Hari dan jam yang tersedia
        const hariList = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Sabtu', 'Ahad'];
        const jamList = [1, 2, 3, 4, 5, 6, 7, 8];

        // Buat map untuk akses cepat: key = hari_jamKe
        const jadwalMap = {};
        jadwalData.forEach(j => {
          const key = `${j.hari}_${j.jamKe}`;
          jadwalMap[key] = j;
        });

        // Bangun tabel
        let html = '<table>';
        
        // Header
        html += '<thead><tr><th>JP</th>';
        hariList.forEach(hari => {
          html += `<th>${hari}</th>`;
        });
        html += '</tr></thead>';

        // Body
        html += '<tbody>';
        jamList.forEach(jam => {
          html += '<tr>';
          html += `<td class="cell-jp">${jam}</td>`;
          
          hariList.forEach(hari => {
            const key = `${hari}_${jam}`;
            const jadwal = jadwalMap[key];
            
            if (jadwal) {
              html += `<td>
                <div class="cell-mapel">${jadwal.mkNama || '-'}</div>
                <div class="cell-kelas">${jadwal.kelasNama || '-'}</div>
                <div class="cell-waktu">${jadwal.waktu || ''}</div>
              </td>`;
            } else {
              html += '<td><span class="cell-kosong">-</span></td>';
            }
          });
          
          html += '</tr>';
        });
        html += '</tbody>';
        html += '</table>';

        container.innerHTML = html;
      } catch(e) {
        container.innerHTML = '<p style="color:red;">Gagal memuat jadwal: ' + e.message + '</p>';
      }
    }

    loadJadwal();
  </script>
</body>
</html>
