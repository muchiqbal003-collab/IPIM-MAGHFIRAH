<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Laporan Kinerjaku - IPIM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9;
            --gold: #d4a843; --gold-light: #fdf6e3;
            --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5;
            --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333;
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px;
            --transition: all 0.25s ease;
            --bottom-nav-height: 64px; --header-height: 56px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); padding-bottom: var(--bottom-nav-height); }
        .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .app-header h3 { font-size: 16px; font-weight: 600; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height); background: var(--white); border-top: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-around; z-index: 100; }
        .bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: var(--gray-600); cursor: pointer; text-decoration: none; padding: 6px 0; }
        .bottom-nav .nav-item i { font-size: 20px; }
        .bottom-nav .nav-item.active { color: var(--green-dark); font-weight: 600; }
        .content { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .card { background: var(--white); border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--gray-200); }
        .form-group { margin-bottom: 12px; }
        .form-group label { font-size: 12px; font-weight: 600; color: var(--gray-600); display: block; margin-bottom: 4px; }
        .form-group textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Poppins', sans-serif; outline: none; resize: vertical; min-height: 80px; }
        .btn-primary { width: 100%; padding: 12px; background: var(--green-dark); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; }
        .alert { padding: 12px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 12px; display: none; }
        .alert-success { background: var(--green-light); color: #1b5e20; }
        .stat-box { display: flex; gap: 12px; margin-bottom: 12px; }
        .stat-item { flex: 1; background: var(--gray-50); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
        .stat-item .val { font-size: 18px; font-weight: 700; color: var(--green-dark); }
        .stat-item .lbl { font-size: 10px; color: var(--gray-600); }
    </style>
</head>
<body>

    <header class="app-header">
        <button class="btn-back" onclick="goTo('dashboard.html')"><i class="fa-solid fa-arrow-left"></i></button>
        <h3>Laporan Kinerjaku</h3>
    </header>

    <div class="content">
        <div id="alertSuccess" class="alert alert-success"></div>

        <div class="card">
            <h4 style="margin-bottom:12px;">📊 Statistik Pekan Ini</h4>
            <div class="stat-box">
                <div class="stat-item"><div class="val" id="statMengajar">-</div><div class="lbl">Mengajar/Halaqoh</div></div>
                <div class="stat-item"><div class="val" id="statSholat">-</div><div class="lbl">Sholat Jamaah</div></div>
                <div class="stat-item"><div class="val" id="statLapor">-</div><div class="lbl">Laporan</div></div>
            </div>
        </div>

        <div class="card">
            <h4 style="margin-bottom:12px;">📋 Kirim Laporan Kinerja Pekan Ini</h4>
            <form id="kinerjaForm">
                <div class="form-group"><label>Ringkasan Kegiatan</label><textarea id="ringkasan" placeholder="Apa saja yang sudah dikerjakan pekan ini?"></textarea></div>
                <div class="form-group"><label>Kendala / Hambatan</label><textarea id="kendala" placeholder="Apakah ada kendala?"></textarea></div>
                <div class="form-group"><label>Rencana Pekan Depan</label><textarea id="rencana" placeholder="Rencana untuk pekan depan?"></textarea></div>
                <button type="submit" class="btn-primary"><i class="fa-solid fa-paper-plane"></i> Kirim Laporan</button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="goTo('dashboard.html')"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item" onclick="goTo('absensi.html')"><i class="fa-solid fa-clipboard-check"></i><span>Absensi</span></div>
        <div class="nav-item" onclick="goTo('kalender.html')"><i class="fa-solid fa-calendar-days"></i><span>Kalender</span></div>
        <div class="nav-item" onclick="goTo('rekap.html')"><i class="fa-solid fa-chart-bar"></i><span>Rekap</span></div>
        <div class="nav-item" onclick="goTo('profil.html')"><i class="fa-solid fa-user"></i><span>Profil</span></div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="../../js/firebase-config.js"></script>
    <script src="../../js/app.js"></script>
    <script>
        const user = checkRole(['dosen', 'musyrif', 'dosen-musyrif', 'umum']);
        if (!user) window.location.href = '../../index.html';
        window.goTo = page => window.location.href = page;

        function showAlert(text) {
            const el = document.getElementById('alertSuccess');
            el.textContent = text; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        // Simpan laporan
        document.getElementById('kinerjaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const ringkasan = document.getElementById('ringkasan').value.trim();
            const kendala = document.getElementById('kendala').value.trim();
            const rencana = document.getElementById('rencana').value.trim();
            if (!ringkasan) return alert('Ringkasan wajib diisi!');
            try {
                await db.collection('laporanKinerja').add({
                    userId: user.uid,
                    nama: user.nama,
                    role: user.role,
                    ringkasan,
                    kendala,
                    rencana,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showAlert('✅ Laporan kinerja berhasil dikirim!');
                this.reset();
            } catch(e) { alert('Gagal: ' + e.message); }
        });
    </script>
</body>
</html>
