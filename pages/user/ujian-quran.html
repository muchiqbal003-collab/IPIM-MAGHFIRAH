<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ujian Al-Quran - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9; --gold: #d4a843; --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333; --radius-sm: 8px; --radius: 12px; --transition: all 0.25s ease; --header-height: 56px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); }
    .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
    .content { padding: 16px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 16px; border: 1px solid var(--gray-200); margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--gray-600); display: block; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Poppins', sans-serif; outline: none; background: white; }
    .soal-box { background: var(--gray-50); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 12px; }
    .soal-box h5 { margin-bottom: 8px; color: var(--green-dark); }
    .nilai-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .nilai-row label { flex: 1; font-size: 11px; }
    .nilai-row input { width: 70px; padding: 8px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); text-align: center; font-size: 13px; }
    .total-soal { text-align: right; font-weight: 700; font-size: 13px; margin-top: 4px; }
    .hasil-akhir { background: var(--green-light); border-radius: var(--radius-sm); padding: 12px; margin-top: 12px; text-align: center; }
    .hasil-akhir .nilai { font-size: 24px; font-weight: 700; color: var(--green-dark); }
    .hasil-akhir .predikat { font-size: 14px; font-weight: 600; }
    .btn-primary { width: 100%; padding: 12px; background: var(--green-dark); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px; }
    .alert { padding: 12px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 12px; display: none; }
    .alert-success { background: var(--green-light); color: #1b5e20; }
    .debug-box { background: #f0f0f0; border-radius: var(--radius-sm); padding: 12px; font-size: 11px; margin-bottom: 12px; color: var(--gray-600); }
    .warning-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: var(--radius-sm); padding: 16px; text-align: center; color: #856404; }
  </style>
</head>
<body>
  <header class="app-header">
    <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <h3>Ujian Al-Quran</h3>
  </header>
  <div class="content">
    <div id="alertSuccess" class="alert alert-success"></div>
    <div id="alertError" class="alert alert-error"></div>
    <div class="card" id="mainCard">
      <div class="debug-box" id="debugBox">UID: <span id="debugUid">-</span></div>
      <form id="ujianForm">
        <div class="form-group"><label>Pilih Mahasiswa</label><select id="mhsId" required><option value="">Pilih...</option></select></div>
        <div class="soal-box"><h5>📝 Soal 1</h5>
          <div class="nilai-row"><label>Kelancaran (40)</label><input type="number" id="s1_kelancaran" min="0" max="40" value="0" oninput="hitungTotal()"></div>
          <div class="nilai-row"><label>Tajwid (30)</label><input type="number" id="s1_tajwid" min="0" max="30" value="0" oninput="hitungTotal()"></div>
          <div class="nilai-row"><label>Makhorij (30)</label><input type="number" id="s1_makhorij" min="0" max="30" value="0" oninput="hitungTotal()"></div>
          <div class="total-soal">Total: <span id="totalS1">0</span></div>
        </div>
        <div class="soal-box"><h5>📝 Soal 2</h5>
          <div class="nilai-row"><label>Kelancaran (40)</label><input type="number" id="s2_kelancaran" min="0" max="40" value="0" oninput="hitungTotal()"></div>
          <div class="nilai-row"><label>Tajwid (30)</label><input type="number" id="s2_tajwid" min="0" max="30" value="0" oninput="hitungTotal()"></div>
          <div class="nilai-row"><label>Makhorij (30)</label><input type="number" id="s2_makhorij" min="0" max="30" value="0" oninput="hitungTotal()"></div>
          <div class="total-soal">Total: <span id="totalS2">0</span></div>
        </div>
        <div class="soal-box"><h5>📝 Soal 3</h5>
          <div class="nilai-row"><label>Kelancaran (40)</label><input type="number" id="s3_kelancaran" min="0" max="40" value="0" oninput="hitungTotal()"></div>
          <div class="nilai-row"><label>Tajwid (30)</label><input type="number" id="s3_tajwid" min="0" max="30" value="0" oninput="hitungTotal()"></div>
          <div class="nilai-row"><label>Makhorij (30)</label><input type="number" id="s3_makhorij" min="0" max="30" value="0" oninput="hitungTotal()"></div>
          <div class="total-soal">Total: <span id="totalS3">0</span></div>
        </div>
        <div class="hasil-akhir"><div class="nilai" id="nilaiAkhir">0</div><div class="predikat" id="predikat">-</div></div>
        <button type="submit" class="btn-primary"><i class="fa-solid fa-save"></i> Simpan Nilai Ujian</button>
      </form>
    </div>
    <div id="warningCard" class="warning-box" style="display:none;">
      <i class="fa-solid fa-circle-exclamation"></i><br>
      <strong>Anda belum memiliki Halaqoh.</strong><br>
      Silakan hubungi Operator Halaqoh.
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['musyrif', 'dosen-musyrif']);
    if (!user) window.location.href = '../../index.html';

    // Debug UID
    document.getElementById('debugUid').textContent = user.uid || 'TIDAK ADA UID';

    function showAlert(type, text) {
      const el = document.getElementById(type === 'success' ? 'alertSuccess' : 'alertError');
      el.textContent = text; el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    async function loadMahasiswa() {
      try {
        let hSnap = await db.collection('halaqoh').where('musyrifId', '==', user.uid).get();
        if (hSnap.empty) hSnap = await db.collection('halaqoh').where('userId', '==', user.uid).get();
        if (hSnap.empty) hSnap = await db.collection('halaqoh').where('uid', '==', user.uid).get();

        if (hSnap.empty) {
          document.getElementById('mainCard').style.display = 'none';
          document.getElementById('warningCard').style.display = 'block';
          return;
        }
        document.getElementById('mainCard').style.display = 'block';
        document.getElementById('warningCard').style.display = 'none';

        const halaqohId = hSnap.docs[0].id;
        const pSnap = await db.collection('pembagianHalaqoh').where('halaqohId', '==', halaqohId).get();
        const sel = document.getElementById('mhsId');
        sel.innerHTML = '<option value="">Pilih Mahasiswa...</option>';
        for (const d of pSnap.docs) {
          const mhsId = d.data().mahasiswaId;
          if (!mhsId) continue;
          const mhsDoc = await db.collection('mahasiswa').doc(mhsId).get();
          if (mhsDoc.exists) {
            const o = document.createElement('option');
            o.value = mhsDoc.id;
            o.textContent = mhsDoc.data().nama;
            sel.appendChild(o);
          }
        }
      } catch(e) { console.error(e); }
    }

    function getVal(id) { return parseInt(document.getElementById(id)?.value) || 0; }

    window.hitungTotal = function() {
      const s1 = getVal('s1_kelancaran') + getVal('s1_tajwid') + getVal('s1_makhorij');
      const s2 = getVal('s2_kelancaran') + getVal('s2_tajwid') + getVal('s2_makhorij');
      const s3 = getVal('s3_kelancaran') + getVal('s3_tajwid') + getVal('s3_makhorij');
      document.getElementById('totalS1').textContent = s1;
      document.getElementById('totalS2').textContent = s2;
      document.getElementById('totalS3').textContent = s3;
      const total = s1 + s2 + s3;
      const nilaiAkhir = Math.round((total / 300) * 100);
      let predikat = 'D';
      if (nilaiAkhir >= 85) predikat = 'A';
      else if (nilaiAkhir >= 75) predikat = 'B';
      else if (nilaiAkhir >= 60) predikat = 'C';
      document.getElementById('nilaiAkhir').textContent = nilaiAkhir;
      document.getElementById('predikat').textContent = `Predikat: ${predikat}`;
    };

    document.getElementById('ujianForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const mhsId = document.getElementById('mhsId').value;
      if (!mhsId) return showAlert('error', 'Pilih mahasiswa!');
      const data = {
        mahasiswaId: mhsId, musyrifId: user.uid,
        soal1: { kelancaran: getVal('s1_kelancaran'), tajwid: getVal('s1_tajwid'), makhorij: getVal('s1_makhorij') },
        soal2: { kelancaran: getVal('s2_kelancaran'), tajwid: getVal('s2_tajwid'), makhorij: getVal('s2_makhorij') },
        soal3: { kelancaran: getVal('s3_kelancaran'), tajwid: getVal('s3_tajwid'), makhorij: getVal('s3_makhorij') },
        nilaiAkhir: parseInt(document.getElementById('nilaiAkhir').textContent),
        predikat: document.getElementById('predikat').textContent.replace('Predikat: ', ''),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      try {
        await db.collection('ujianQuran').add(data);
        showAlert('success', '✅ Nilai ujian berhasil disimpan!');
        this.reset();
        document.getElementById('nilaiAkhir').textContent = '0';
        document.getElementById('predikat').textContent = '-';
        ['S1','S2','S3'].forEach(s => document.getElementById('total'+s).textContent = '0');
      } catch(e) { showAlert('error', 'Gagal: ' + e.message); }
    });

    loadMahasiswa();
    hitungTotal();
  </script>
</body>
</html>
