<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Menu Cepat - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9;
      --gold: #d4a843; --gold-light: #fdf6e3;
      --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5;
      --gray-200: #e0e0e0; --gray-300: #bdbdbd; --gray-400: #9e9e9e;
      --gray-600: #616161; --gray-800: #333333;
      --red: #e53935; --red-light: #fce4ec;
      --blue: #1565c0; --blue-light: #e3f2fd;
      --orange: #e65100; --orange-light: #fff3e0;
      --purple: #6a1b9a; --purple-light: #f3e5f5;
      --teal: #00695c; --teal-light: #e0f2f1;
      --radius-sm: 10px; --radius: 14px; --radius-lg: 20px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --bottom-nav-height: 68px;
      --header-height: 56px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif; background: #f0f4f3;
      color: var(--gray-800); padding-top: var(--header-height);
      padding-bottom: calc(var(--bottom-nav-height) + 16px);
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .app-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(135deg, #004d40 0%, #00695c 100%);
      color: white; padding: 12px 20px; display: flex; align-items: center;
      gap: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .app-header .btn-back {
      width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15);
      border: none; color: white; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition); backdrop-filter: blur(10px);
    }
    .app-header .btn-back:active { background: rgba(255,255,255,0.25); transform: scale(0.9); }
    .app-header h3 { font-size: 17px; font-weight: 700; flex: 1; letter-spacing: -0.3px; }
    /* Header avatar dihapus, tidak ada di CSS */

    /* ── Content ── */
    .content { padding: 16px 16px 8px; max-width: 500px; margin: 0 auto; }

    /* ── Section ── */
    .section-wrapper { margin-bottom: 20px; animation: fadeInUp 0.5s ease both; }
    .section-wrapper:nth-child(1) { animation-delay: 0s; }
    .section-wrapper:nth-child(2) { animation-delay: 0.05s; }
    .section-wrapper:nth-child(3) { animation-delay: 0.1s; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .section-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .section-icon {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .section-icon.umum { background: #e3f2fd; color: #1565c0; }
    .section-icon.akademik { background: #e8f5e9; color: #1b5e20; }
    .section-icon.halaqoh { background: #fff3e0; color: #e65100; }
    .section-icon.pa { background: #f3e5f5; color: #6a1b9a; }
    .section-label { font-size: 14px; font-weight: 700; color: var(--gray-800); }
    .section-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
      background: var(--gray-200); color: var(--gray-600); margin-left: auto;
    }

    /* ── Menu Grid ── */
    .menu-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .menu-card {
      background: var(--white); border-radius: var(--radius);
      padding: 18px 10px 14px; text-align: center; cursor: pointer;
      transition: var(--transition); box-shadow: var(--shadow-sm);
      border: 1px solid transparent; position: relative; overflow: hidden;
      -webkit-user-select: none; user-select: none;
    }
    .menu-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: 0 0 4px 4px; opacity: 0; transition: var(--transition);
    }
    .menu-card:active {
      transform: scale(0.94); box-shadow: var(--shadow-md);
      border-color: var(--gray-200);
    }
    .menu-card:active::before { opacity: 1; }
    .menu-card.accent-green::before { background: var(--green); }
    .menu-card.accent-blue::before { background: var(--blue); }
    .menu-card.accent-orange::before { background: var(--orange); }
    .menu-card.accent-purple::before { background: var(--purple); }
    .menu-card.accent-teal::before { background: var(--teal); }
    .menu-card .menu-icon {
      width: 46px; height: 46px; border-radius: 14px; margin: 0 auto 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: var(--transition);
    }
    .menu-card:active .menu-icon { transform: scale(1.1); }
    .menu-icon.green { background: #e8f5e9; color: #1b5e20; }
    .menu-icon.blue { background: #e3f2fd; color: #1565c0; }
    .menu-icon.orange { background: #fff3e0; color: #e65100; }
    .menu-icon.purple { background: #f3e5f5; color: #6a1b9a; }
    .menu-icon.teal { background: #e0f2f1; color: #00695c; }
    .menu-icon.red { background: #fce4ec; color: #c62828; }
    .menu-icon.gold { background: #fdf6e3; color: #b8860b; }
    .menu-card .menu-label {
      font-size: 11px; font-weight: 600; color: var(--gray-800);
      line-height: 1.3; display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .menu-card .menu-sub {
      font-size: 10px; color: var(--gray-400); margin-top: 2px;
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height);
      background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: space-around;
      z-index: 100; padding: 0 8px;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
    }
    .bottom-nav .nav-item {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; font-size: 10px; color: var(--gray-400);
      cursor: pointer; text-decoration: none; padding: 6px 12px;
      border-radius: 16px; transition: var(--transition); gap: 3px;
      -webkit-user-select: none; user-select: none;
    }
    .bottom-nav .nav-item i { font-size: 20px; transition: var(--transition); }
    .bottom-nav .nav-item.active {
      color: var(--green-dark); font-weight: 600;
    }
    .bottom-nav .nav-item.active i {
      color: var(--green-dark);
      filter: drop-shadow(0 2px 4px rgba(0,77,64,0.3));
    }
    .bottom-nav .nav-item:active { transform: scale(0.9); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--gray-800); color: white; padding: 10px 22px;
      border-radius: 24px; font-size: 12px; font-weight: 500; z-index: 999;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
      box-shadow: var(--shadow-lg);
    }
    .toast.show { opacity: 1; }

    /* ── Ripple ── */
    .ripple { position: relative; overflow: hidden; }
    .ripple::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
      border-radius: 50%; background: rgba(0,0,0,0.06);
      transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s;
    }
    .ripple:active::after { width: 300px; height: 300px; }

    @media (max-width: 360px) {
      .menu-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .menu-card { padding: 14px 6px 12px; }
      .menu-card .menu-icon { width: 38px; height: 38px; border-radius: 12px; font-size: 17px; }
      .menu-card .menu-label { font-size: 10px; }
    }
  </style>
</head>
<body>

  <!-- ── Header (tanpa avatar profil) ── -->
  <header class="app-header">
    <button class="btn-back ripple" onclick="goTo('dashboard.html')">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <h3>Menu Cepat</h3>
    <!-- Tidak ada avatar di pojok kanan -->
  </header>

  <!-- ── Content ── -->
  <div class="content" id="mainContent">
    <div style="text-align:center;padding:40px 0;color:var(--gray-400);">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:24px;"></i>
      <p style="margin-top:8px;font-size:13px;">Memuat menu...</p>
    </div>
  </div>

  <!-- ── Bottom Nav ── -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="goTo('dashboard.html')"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item" onclick="goTo('kalender.html')"><i class="fa-solid fa-calendar-days"></i><span>Kalender</span></div>
    <div class="nav-item active"><i class="fa-solid fa-bolt"></i><span>Menu</span></div>
    <div class="nav-item" onclick="goTo('rekap.html')"><i class="fa-solid fa-chart-bar"></i><span>Rekap</span></div>
    <div class="nav-item" onclick="goTo('profil.html')"><i class="fa-solid fa-user"></i><span>Profil</span></div>
  </nav>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    // ── Auth ──
    const user = checkRole(['dosen', 'musyrif', 'dosen-musyrif', 'umum']);
    if (!user) window.location.href = '../../index.html';

    window.goTo = page => window.location.href = page;

    // Header avatar tidak diperlukan lagi

    // ── Toast ──
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ── Menu Definitions ──
    const menuUmumItems = [
      { icon: 'fa-mosque', color: 'blue', label: 'Absensi Sholat', page: 'absensi.html', sub: 'Catat sholat' },
      { icon: 'fa-chart-line', color: 'green', label: 'Kinerjaku', page: 'kinerja.html', sub: 'Lihat statistik' },
      { icon: 'fa-clipboard-list', color: 'orange', label: 'Lapor', page: 'lapor.html', sub: 'Buat laporan' },
    ];

    const menuAkademikItems = [
      { icon: 'fa-file-alt', color: 'green', label: 'Silabus', page: 'silabus.html', sub: 'RPS & materi' },
      { icon: 'fa-pen-to-square', color: 'teal', label: 'Pencapaian', page: 'pencapaian.html', sub: 'Input capaian' },
      { icon: 'fa-calendar-alt', color: 'blue', label: 'Jadwal Saya', page: 'jadwal-saya.html', sub: 'Lihat jadwal' },
      { icon: 'fa-chart-line', color: 'orange', label: 'Input Nilai', page: 'nilai.html', sub: 'Nilai mhs' },
      { icon: 'fa-user-graduate', color: 'purple', label: 'Mahasiswa PA', page: 'mahasiswa-bimbingan.html', sub: 'Bimbingan' },
      { icon: 'fa-clipboard-check', color: 'teal', label: 'Absensi MK', page: 'rekap-absensi-kelas.html', sub: 'Rekap hadir' },
    ];

    const menuHalaqohItems = [
      { icon: 'fa-users', color: 'orange', label: 'Anggota Halaqoh', page: 'anggota-halaqohku.html', sub: 'Lihat anggota' },
      { icon: 'fa-clipboard-check', color: 'green', label: 'Absensi Halaqoh', page: 'absensi-halaqoh.html', sub: 'Catat hadir' },
      { icon: 'fa-book-open', color: 'purple', label: 'Setoran Hafalan', page: 'hafalan.html', sub: 'Input hafalan' },
      { icon: 'fa-quran', color: 'gold', label: 'Ujian Quran', page: 'ujian-quran.html', sub: 'Nilai ujian' },
      { icon: 'fa-chart-simple', color: 'blue', label: 'Rekap Halaqoh', page: 'rekap-halaqoh.html', sub: 'Progress' },
    ];

    // ── Build Menu Card HTML ──
    function buildMenuCard(item, accentClass) {
      return `
        <div class="menu-card ripple ${accentClass || ''}" onclick="goTo('${item.page}')">
          <div class="menu-icon ${item.color}">
            <i class="fa-solid ${item.icon}"></i>
          </div>
          <div class="menu-label">${item.label}</div>
          ${item.sub ? `<div class="menu-sub">${item.sub}</div>` : ''}
        </div>
      `;
    }

    function buildSection(iconClass, iconColorClass, label, items, sectionId) {
      if (!items || items.length === 0) return '';
      let accentMap = {
        'green': 'accent-green', 'blue': 'accent-blue', 'orange': 'accent-orange',
        'purple': 'accent-purple', 'teal': 'accent-teal', 'red': 'accent-green',
        'gold': 'accent-orange',
      };
      return `
        <div class="section-wrapper" id="${sectionId}">
          <div class="section-header">
            <div class="section-icon ${iconColorClass}">
              <i class="fa-solid ${iconClass}"></i>
            </div>
            <span class="section-label">${label}</span>
            <span class="section-badge">${items.length} menu</span>
          </div>
          <div class="menu-grid">
            ${items.map(item => buildMenuCard(item, accentMap[item.color] || 'accent-green')).join('')}
          </div>
        </div>
      `;
    }

    // ── Get PA count ──
    async function getPABimbinganCount() {
      try {
        if (user.role !== 'dosen' && user.role !== 'dosen-musyrif') return 0;
        const snap = await db.collection('mahasiswa').where('paId', '==', user.uid).get();
        return snap.size;
      } catch (e) {
        console.error('Gagal ambil data PA:', e);
        return 0;
      }
    }

    // ── Render ──
    async function render() {
      const container = document.getElementById('mainContent');
      const role = user.role;

      // Dapatkan jumlah mahasiswa bimbingan
      const paCount = await getPABimbinganCount();

      // Update sub label Mahasiswa PA kalau ada datanya
      const menuAkademikWithCount = menuAkademikItems.map(item => {
        if (item.page === 'mahasiswa-bimbingan.html') {
          return { ...item, sub: paCount > 0 ? `${paCount} mahasiswa` : 'Belum ada' };
        }
        return item;
      });

      // Tanpa welcome card, langsung section menu
      let html = '';

      // Section: Umum (semua role)
      html += buildSection('fa-grip', 'umum', 'Menu Umum', menuUmumItems, 'sec-umum');

      // Section: Akademik (dosen, dosen-musyrif)
      if (role === 'dosen' || role === 'dosen-musyrif') {
        html += buildSection('fa-book-open', 'akademik', 'Akademik', menuAkademikWithCount, 'sec-akademik');
      }

      // Section: Halaqoh (musyrif, dosen-musyrif)
      if (role === 'musyrif' || role === 'dosen-musyrif') {
        html += buildSection('fa-mosque', 'halaqoh', 'Halaqoh & Tahfidz', menuHalaqohItems, 'sec-halaqoh');
      }

      container.innerHTML = html;

      // Animasi stagger pada kartu menu
      const cards = container.querySelectorAll('.menu-card');
      cards.forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(12px)';
        card.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
        setTimeout(() => {
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
        }, 80 + i * 30);
      });
    }

    render();
  </script>
</body>
</html>
