<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Absensi Halaqoh - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9; --gold: #d4a843; --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333; --radius-sm: 8px; --radius: 12px; --transition: all 0.25s ease; --header-height: 56px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); }
    .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
    .content { padding: 16px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 16px; border: 1px solid var(--gray-200); margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--gray-600); display: block; margin-bottom: 4px; }
    .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Poppins', sans-serif; outline: none; background: white; }
    .santri-list { display: flex; flex-direction: column; gap: 8px; }
    .santri-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: var(--gray-50); border-radius: var(--radius-sm); }
    .status-btns { display: flex; gap: 4px; }
    .status-btn { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--gray-200); background: white; }
    .status-btn.sakit { color: #d97706; border-color: #fde68a; }
    .status-btn.izin { color: #2563eb; border-color: #bfdbfe; }
    .status-btn.alfa { color: #dc2626; border-color: #fecaca; }
    .status-btn.jaga { color: #7c3aed; border-color: #ddd6fe; }
    .status-btn.active { background: #d1fae5; border-color: #10b981; color: #065f46; }
    .status-btn.active.sakit { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
    .status-btn.active.izin { background: #dbeafe; border-color: #3b82f6; color: #1e40af; }
    .status-btn.active.alfa { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
    .status-btn.active.jaga { background: #ede9fe; border-color: #8b5cf6; color: #6d28d9; }
    .btn-primary { width: 100%; padding: 12px; background: var(--green-dark); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px; }
    .alert { padding: 12px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 12px; display: none; }
    .alert-success { background: var(--green-light); color: #1b5e20; }
    .debug-box { background: #f0f0f0; border-radius: var(--radius-sm); padding: 12px; font-size: 11px; margin-bottom: 12px; color: var(--gray-600); }
    .warning-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: var(--radius-sm); padding: 16px; text-align: center; color: #856404; }
  </style>
</head>
<body>
  <header class="app-header">
    <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <h3>Absensi Halaqoh</h3>
  </header>
  <div class="content">
    <div id="alertSuccess" class="alert alert-success"></div>
    <div class="card" id="mainCard">
      <div class="debug-box" id="debugBox">UID: <span id="debugUid">-</span></div>
      <div class="form-group"><label>Pilih Halaqoh</label><select id="filterHalaqoh" onchange="loadAbsensi()"><option value="">Pilih Halaqoh...</option></select></div>
      <div class="santri-list" id="listHalaqoh"><p style="text-align:center;color:var(--gray-600);">Pilih halaqoh terlebih dahulu</p></div>
      <button class="btn-primary" onclick="simpanAbsensi()">Simpan Absensi</button>
    </div>
    <div id="warningCard" class="warning-box" style="display:none;">
      <i class="fa-solid fa-circle-exclamation"></i><br>
      <strong>Anda belum memiliki Halaqoh.</strong><br>
      Silakan hubungi Operator Halaqoh.
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['musyrif', 'dosen-musyrif']);
    if (!user) window.location.href = '../../index.html';
    let absensiHalaqoh = {};
    let currentHalaqohId = null;

    // Debug UID
    document.getElementById('debugUid').textContent = user.uid || 'TIDAK ADA UID';

    function showAlert(text) {
      const el = document.getElementById('alertSuccess');
      el.textContent = text; el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 2000);
    }

    async function loadFilterHalaqoh() {
      const sel = document.getElementById('filterHalaqoh');
      sel.innerHTML = '<option value="">Mencari halaqoh...</option>';
      try {
        let hSnap = await db.collection('halaqoh').where('musyrifId', '==', user.uid).get();
        if (hSnap.empty) hSnap = await db.collection('halaqoh').where('userId', '==', user.uid).get();
        if (hSnap.empty) hSnap = await db.collection('halaqoh').where('uid', '==', user.uid).get();

        if (hSnap.empty) {
          document.getElementById('mainCard').style.display = 'none';
          document.getElementById('warningCard').style.display = 'block';
          return;
        }
        document.getElementById('mainCard').style.display = 'block';
        document.getElementById('warningCard').style.display = 'none';
        sel.innerHTML = '<option value="">Pilih Halaqoh...</option>';
        hSnap.forEach(doc => {
          const o = document.createElement('option');
          o.value = doc.id;
          o.textContent = doc.data().nama;
          sel.appendChild(o);
        });
      } catch(e) {
        sel.innerHTML = '<option value="">Error: ' + e.message + '</option>';
      }
    }

    window.loadAbsensi = async function() {
      const halaqohId = document.getElementById('filterHalaqoh').value;
      if (!halaqohId) { document.getElementById('listHalaqoh').innerHTML = '<p style="text-align:center;">Pilih halaqoh</p>'; return; }
      currentHalaqohId = halaqohId;
      try {
        const anggotaSnap = await db.collection('pembagianHalaqoh').where('halaqohId', '==', halaqohId).get();
        const ids = anggotaSnap.docs.map(d => d.data().mahasiswaId);
        let allMhs = [];
        for (const id of ids) {
          const d = await db.collection('mahasiswa').doc(id).get();
          if (d.exists) allMhs.push({ id, data: d.data() });
        }
        absensiHalaqoh = {};
        let html = '';
        allMhs.forEach(m => {
          absensiHalaqoh[m.id] = 'hadir';
          html += `<div class="santri-row"><span>${m.data.nama}</span><div class="status-btns">${['sakit','izin','alfa','jaga'].map(s => `<button class="status-btn ${s}" id="btn-halaqoh-${m.id}-${s}" onclick="setStatus('${m.id}','${s}')">${s==='jaga'?'Jaga Malam':s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('')}</div></div>`;
        });
        document.getElementById('listHalaqoh').innerHTML = html || '<p>Tidak ada anggota</p>';
      } catch(e) { document.getElementById('listHalaqoh').innerHTML = '<p style="color:red;">Error: ' + e.message + '</p>'; }
    };

    window.setStatus = (id, status) => {
      absensiHalaqoh[id] = status;
      ['sakit','izin','alfa','jaga'].forEach(s => {
        const btn = document.getElementById(`btn-halaqoh-${id}-${s}`);
        if (btn) { btn.classList.remove('active'); if (s === status) btn.classList.add('active'); }
      });
    };

    window.simpanAbsensi = async function() {
      if (!currentHalaqohId || Object.keys(absensiHalaqoh).length === 0) return showAlert('Pilih halaqoh dan pastikan ada anggota');
      const today = new Date().toISOString().split('T')[0];
      const batch = db.batch();
      for (const [mhsId, status] of Object.entries(absensiHalaqoh)) {
        const ref = db.collection('absensiHalaqoh').doc();
        batch.set(ref, { mahasiswaId: mhsId, musyrifId: user.uid, halaqohId: currentHalaqohId, status, tanggal: today, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      }
      await batch.commit();
      showAlert('✅ Absensi disimpan!');
    };

    loadFilterHalaqoh();
  </script>
</body>
</html>
