<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Rekap Absensi Kelas - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --green: #00875A;
      --green-dark: #006644;
      --green-bg: #E3FCEF;
      --green-text: #006644;
      --red: #DE350B;
      --red-bg: #FFEBE6;
      --red-text: #BF2600;
      --amber: #FF8B00;
      --amber-bg: #FFF7D0;
      --amber-text: #7A4100;
      --blue: #0052CC;
      --blue-bg: #DEEBFF;
      --blue-text: #0747A6;
      --surface: #FFFFFF;
      --bg: #F4F5F7;
      --border: #DFE1E6;
      --text: #172B4D;
      --text-muted: #6B778C;
      --text-subtle: #97A0AF;
      --radius: 8px;
      --radius-lg: 14px;
      --header-h: 56px;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-top: var(--header-h);
      padding-bottom: 40px;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ─── HEADER ─── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: var(--green-dark);
      height: var(--header-h);
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
    }
    .btn-back {
      width: 36px; height: 36px; flex-shrink: 0;
      background: rgba(255,255,255,0.12);
      border: none; border-radius: 50%;
      color: white; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-back:active { background: rgba(255,255,255,0.25); transform: scale(0.94); }
    .header-title { color: white; font-size: 15px; font-weight: 600; flex: 1; }
    .btn-excel {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: var(--radius);
      color: white; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      white-space: nowrap;
    }
    .btn-excel:hover { background: rgba(255,255,255,0.22); }
    .btn-excel:active { transform: scale(0.96); }
    .btn-excel:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ─── PAGE ─── */
    .page { padding: 14px; max-width: 900px; margin: 0 auto; }

    /* ─── CARD ─── */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .card-body { padding: 16px; }

    /* ─── SELECT ─── */
    .field-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .select-wrap { position: relative; }
    .select-wrap select {
      width: 100%; padding: 10px 34px 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px; font-family: inherit;
      color: var(--text); background: var(--surface);
      appearance: none; outline: none; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .select-wrap select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,135,90,0.12); }
    .select-wrap::after {
      content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
      position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 10px; pointer-events: none;
    }

    /* ─── META ROW ─── */
    .meta-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .meta-chip {
      display: flex; align-items: center; gap: 5px;
      font-size: 11.5px; color: var(--text-muted);
    }
    .meta-chip i { font-size: 11px; }
    .meta-chip strong { font-weight: 600; color: var(--text); }
    .meta-sep { color: var(--border); font-size: 14px; }

    /* ─── SUMMARY CARDS ─── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sum-card {
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 10px 12px;
    }
    .sum-card .sc-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .sum-card .sc-val { font-size: 20px; font-weight: 700; color: var(--text); margin-top: 2px; }
    .sum-card.danger .sc-val { color: var(--red); }
    .sum-card.success .sc-val { color: var(--green); }

    /* ─── TABLE WRAPPER ─── */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-wrap table {
      width: 100%; border-collapse: collapse;
      min-width: 560px;
    }
    .table-wrap thead tr {
      background: var(--bg);
      border-bottom: 2px solid var(--border);
    }
    .table-wrap th {
      padding: 9px 10px;
      font-size: 10px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-align: center;
      white-space: nowrap;
    }
    .table-wrap th.left { text-align: left; }
    .table-wrap td {
      padding: 10px 10px;
      font-size: 12.5px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      transition: background 0.12s;
    }
    .table-wrap td.left { text-align: left; }
    .table-wrap tbody tr:last-child td { border-bottom: none; }
    .table-wrap tbody tr:hover td { background: #F8F9FA; }

    /* No col */
    .td-no { color: var(--text-subtle); font-size: 11px; width: 32px; }

    /* Nama cell */
    .nama-cell { display: flex; align-items: center; gap: 8px; }
    .mini-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      flex-shrink: 0;
    }
    .nama-text { font-size: 12.5px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .nim-text { font-size: 10.5px; color: var(--text-subtle); }

    /* Count cells */
    .td-count { font-size: 13px; font-weight: 600; }
    .td-count.zero { color: var(--text-subtle); font-weight: 400; }
    .td-count.sakit { color: #D97706; }
    .td-count.izin  { color: var(--blue); }
    .td-count.alfa  { color: var(--red); }
    .td-count.jaga  { color: #7C3AED; }

    /* Badge persentase */
    .pct-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .pct-badge.good   { background: var(--green-bg); color: var(--green-text); }
    .pct-badge.warn   { background: var(--amber-bg); color: var(--amber-text); }
    .pct-badge.danger { background: var(--red-bg); color: var(--red-text); }
    .pct-badge i { font-size: 9px; }

    /* ─── STATES ─── */
    .state-box { text-align: center; padding: 48px 20px; color: var(--text-subtle); }
    .state-box i { font-size: 32px; margin-bottom: 10px; display: block; opacity: 0.4; }
    .state-box p { font-size: 13px; }
    .state-box small { font-size: 11px; color: var(--text-subtle); margin-top: 4px; display: block; }

    /* ─── TOAST ─── */
    .toast-overlay {
      position: fixed; inset: 0; z-index: 9990;
      background: rgba(0,0,0,0.28);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .toast-overlay.show { opacity: 1; }
    .toast {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.88);
      z-index: 9999; opacity: 0; pointer-events: none;
      background: #1B2638; color: white;
      padding: 15px 20px; border-radius: 14px;
      max-width: 82vw; min-width: 220px;
      display: flex; align-items: center; gap: 11px;
      font-size: 13.5px; font-weight: 500;
      transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
      box-shadow: 0 12px 40px rgba(0,0,0,0.28);
    }
    .toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    .toast.success { background: var(--green-dark); }
    .toast.error   { background: var(--red); }
    .toast i { font-size: 18px; flex-shrink: 0; }
    .toast-text small { display: block; font-size: 11px; opacity: 0.75; margin-top: 2px; }

    /* ─── SPINNER ─── */
    .spinner {
      width: 15px; height: 15px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.55s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .summary-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .btn-excel span { display: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <button class="btn-back" onclick="history.back()" aria-label="Kembali">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <span class="header-title">Rekap Absensi</span>
    <button class="btn-excel" id="btnExcel" onclick="exportExcel()" disabled>
      <i class="fa-solid fa-file-excel"></i>
      <span>Download Excel</span>
    </button>
  </header>

  <div class="toast-overlay" id="toastOverlay"></div>
  <div class="toast" id="toast" role="status" aria-live="polite">
    <i id="toastIcon"></i>
    <div class="toast-text"><span id="toastMsg"></span><small id="toastSub"></small></div>
  </div>

  <div class="page">

    <!-- FILTER -->
    <div class="card">
      <div class="card-body">
        <div class="field-label">Matakuliah</div>
        <div class="select-wrap">
          <select id="filterMatkul" onchange="loadRekap()">
            <option value="">Pilih matakuliah...</option>
          </select>
        </div>
      </div>
    </div>

    <!-- TABLE CARD -->
    <div class="card" id="tableCard">
      <div class="state-box">
        <i class="fa-solid fa-table-list"></i>
        <p>Pilih matakuliah untuk melihat rekap</p>
      </div>
    </div>

  </div>

  <!-- SheetJS untuk export Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['dosen', 'dosen-musyrif']);
    if (!user) window.location.href = '../../index.html';

    let rekapData    = []; // data final untuk export
    let currentMkNama = '';
    let currentTotalPertemuan = 0;

    /* ─── TOAST ─── */
    let toastTimer;
    function showToast(type, text, sub) {
      clearTimeout(toastTimer);
      const toast   = document.getElementById('toast');
      const overlay = document.getElementById('toastOverlay');
      document.getElementById('toastIcon').className =
        type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-exclamation';
      document.getElementById('toastMsg').textContent = text;
      document.getElementById('toastSub').textContent = sub || '';
      toast.className = 'toast ' + type + ' show';
      overlay.className = 'toast-overlay show';
      toastTimer = setTimeout(() => {
        toast.className = 'toast ' + type;
        overlay.className = 'toast-overlay';
      }, 3500);
    }

    /* ─── INITIALS ─── */
    function getInitials(nama) {
      return (nama || '').split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase() || '?';
    }

    /* ─── LOAD FILTER ─── */
    async function loadFilter() {
      const sel = document.getElementById('filterMatkul');
      try {
        const snap = await db.collection('jadwal').where('dosenId', '==', user.uid).get();
        const ids = [...new Set(snap.docs.map(d => d.data().mkId).filter(Boolean))];
        for (const id of ids) {
          const doc = await db.collection('matakuliah').doc(id).get();
          if (doc.exists) {
            const o = document.createElement('option');
            o.value = id;
            o.textContent = doc.data().nama || id;
            sel.appendChild(o);
          }
        }
      } catch(e) {
        console.error('loadFilter error:', e);
      }
    }

    /* ─── LOAD REKAP ─── */
    window.loadRekap = async function() {
      const mkId = document.getElementById('filterMatkul').value;
      const card = document.getElementById('tableCard');
      const btnExcel = document.getElementById('btnExcel');

      rekapData = [];
      btnExcel.disabled = true;

      if (!mkId) {
        card.innerHTML = '<div class="state-box"><i class="fa-solid fa-table-list"></i><p>Pilih matakuliah untuk melihat rekap</p></div>';
        return;
      }

      card.innerHTML = '<div class="state-box"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Memuat data rekap...</p></div>';

      try {
        /* 1. Nama matakuliah */
        const mkDoc = await db.collection('matakuliah').doc(mkId).get();
        currentMkNama = mkDoc.exists ? (mkDoc.data().nama || 'Matakuliah') : 'Matakuliah';

        /* 2. Total pertemuan dari jadwal */
        const jadwalSnap = await db.collection('jadwal')
          .where('dosenId', '==', user.uid)
          .where('mkId', '==', mkId)
          .get();
        currentTotalPertemuan = 16;
        if (!jadwalSnap.empty) {
          currentTotalPertemuan = jadwalSnap.docs[0].data().totalPertemuan || 16;
        }

        /* 3. Semua dokumen absensi untuk matakuliah ini */
        // Coba field mapelId dulu, lalu mkId (handle dua skema)
        let absenDocs = [];
        const snap1 = await db.collection('absensi').where('dosenId', '==', user.uid).where('mapelId', '==', mkId).get();
        absenDocs = [...snap1.docs];
        if (absenDocs.length === 0) {
          const snap2 = await db.collection('absensi').where('dosenId', '==', user.uid).where('mkId', '==', mkId).get();
          absenDocs = [...snap2.docs];
        }

        /* 4. Kumpulkan rekap per mahasiswaId */
        const rekapMap = {}; // { mhsId: { sakit, izin, alfa, jaga, nama?, nim? } }
        absenDocs.forEach(doc => {
          const d = doc.data();
          // Field mahasiswaId — coba beberapa kemungkinan nama field
          const mhsId = d.mahasiswaId || d.santriId || d.userId || null;
          if (!mhsId) return;
          if (!rekapMap[mhsId]) rekapMap[mhsId] = { sakit: 0, izin: 0, alfa: 0, jaga: 0 };
          const status = d.status || 'hadir';
          if (status !== 'hadir') {
            rekapMap[mhsId][status] = (rekapMap[mhsId][status] || 0) + 1;
          }
        });

        /* 5. Fetch nama mahasiswa — SATU PER SATU dengan cache agar tidak dobel */
        const mhsCache = {};
        async function getMahasiswa(id) {
          if (mhsCache[id] !== undefined) return mhsCache[id];
          const doc = await db.collection('mahasiswa').doc(id).get();
          mhsCache[id] = doc.exists ? doc.data() : null;
          return mhsCache[id];
        }

        const arr = [];
        for (const [mhsId, val] of Object.entries(rekapMap)) {
          const mhsData = await getMahasiswa(mhsId);

          // Skip jika data mahasiswa tidak ditemukan sama sekali
          if (!mhsData) {
            console.warn('Mahasiswa tidak ditemukan di koleksi mahasiswa, skip ID:', mhsId);
            continue;
          }

          const nama = mhsData.nama || mhsData.name || null;
          // Jika nama kosong/null → skip (berarti dokumen ada tapi field nama tidak ada)
          if (!nama || nama.trim() === '') {
            console.warn('Field nama kosong untuk ID:', mhsId, '| data:', mhsData);
            continue;
          }

          const nim = mhsData.nim || mhsData.nrp || mhsData.nisn || '—';
          const sakit = val.sakit || 0;
          const izin  = val.izin  || 0;
          const alfa  = val.alfa  || 0;
          const jaga  = val.jaga  || 0;
          const totalTidakHadir = sakit + izin + alfa + jaga;
          const hadir = Math.max(0, currentTotalPertemuan - totalTidakHadir);
          const persentase = currentTotalPertemuan > 0
            ? Math.round((hadir / currentTotalPertemuan) * 100) : 0;

          arr.push({ mhsId, nama, nim, hadir, sakit, izin, alfa, jaga, totalTidakHadir, persentase });
        }

        arr.sort((a, b) => a.nama.localeCompare(b.nama, 'id'));
        rekapData = arr;

        /* 6. Hitung summary */
        const lulusCount  = arr.filter(r => r.persentase >= 75).length;
        const tidakLulus  = arr.filter(r => r.persentase < 75).length;
        const totalAlfa   = arr.reduce((s, r) => s + r.alfa, 0);

        /* 7. Render */
        if (arr.length === 0) {
          card.innerHTML = `
            <div class="state-box">
              <i class="fa-solid fa-inbox"></i>
              <p>Belum ada data absensi</p>
              <small>untuk matakuliah ini</small>
            </div>`;
          return;
        }

        let html = `
          <div class="meta-row">
            <div class="meta-chip"><i class="fa-solid fa-book"></i> <span>${currentMkNama}</span></div>
            <span class="meta-sep">·</span>
            <div class="meta-chip"><i class="fa-solid fa-calendar-check"></i> Total Pertemuan: <strong>${currentTotalPertemuan}x</strong></div>
            <span class="meta-sep">·</span>
            <div class="meta-chip"><i class="fa-solid fa-users"></i> <strong>${arr.length}</strong> mahasiswa</div>
          </div>
          <div class="summary-grid">
            <div class="sum-card success">
              <div class="sc-label">Lulus Hadir</div>
              <div class="sc-val">${lulusCount}</div>
            </div>
            <div class="sum-card danger">
              <div class="sc-label">Tidak Lulus</div>
              <div class="sc-val">${tidakLulus}</div>
            </div>
            <div class="sum-card">
              <div class="sc-label">Total Alfa</div>
              <div class="sc-val">${totalAlfa}</div>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="left" style="padding-left:14px;">#</th>
                  <th class="left">Nama Mahasiswa</th>
                  <th>Hadir</th>
                  <th>Sakit</th>
                  <th>Izin</th>
                  <th>Alfa</th>
                  <th>Jaga</th>
                  <th>% Hadir</th>
                </tr>
              </thead>
              <tbody>`;

        arr.forEach((r, i) => {
          const pctClass = r.persentase >= 75 ? 'good' : r.persentase >= 50 ? 'warn' : 'danger';
          const pctIcon  = r.persentase >= 75 ? 'fa-circle-check' : r.persentase >= 50 ? 'fa-triangle-exclamation' : 'fa-circle-xmark';

          const cell = (val, cls) =>
            `<td class="td-count ${cls} ${val === 0 ? 'zero' : ''}">${val === 0 ? '—' : val}</td>`;

          html += `
            <tr>
              <td class="td-no left" style="padding-left:14px;">${i + 1}</td>
              <td class="left">
                <div class="nama-cell">
                  <div class="mini-avatar">${getInitials(r.nama)}</div>
                  <div>
                    <div class="nama-text">${r.nama}</div>
                    <div class="nim-text">${r.nim}</div>
                  </div>
                </div>
              </td>
              <td class="td-count" style="font-weight:700;">${r.hadir}</td>
              ${cell(r.sakit, 'sakit')}
              ${cell(r.izin,  'izin')}
              ${cell(r.alfa,  'alfa')}
              ${cell(r.jaga,  'jaga')}
              <td><span class="pct-badge ${pctClass}"><i class="fa-solid ${pctIcon}"></i> ${r.persentase}%</span></td>
            </tr>`;
        });

        html += `</tbody></table></div>`;
        card.innerHTML = html;
        btnExcel.disabled = false;

      } catch(e) {
        console.error('loadRekap error:', e);
        card.innerHTML = `<div class="state-box"><i class="fa-solid fa-triangle-exclamation"></i><p>Gagal memuat data</p><small>${e.message}</small></div>`;
      }
    };

    /* ─── EXPORT EXCEL (SheetJS) ─── */
    window.exportExcel = function() {
      if (!rekapData.length) { showToast('error', 'Tidak ada data untuk diexport'); return; }

      try {
        const wb = XLSX.utils.book_new();

        // Header baris info
        const infoRows = [
          ['REKAP ABSENSI KELAS'],
          ['Matakuliah', currentMkNama],
          ['Total Pertemuan', currentTotalPertemuan],
          ['Tanggal Export', new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })],
          [], // baris kosong
        ];

        // Header tabel
        const tableHeader = ['No', 'Nama Mahasiswa', 'NIM', 'Hadir', 'Sakit', 'Izin', 'Alfa', 'Jaga Malam', 'Total Tidak Hadir', 'Total Pertemuan', '% Kehadiran', 'Keterangan'];

        // Rows data
        const tableRows = rekapData.map((r, i) => [
          i + 1,
          r.nama,
          r.nim,
          r.hadir,
          r.sakit,
          r.izin,
          r.alfa,
          r.jaga,
          r.totalTidakHadir,
          currentTotalPertemuan,
          r.persentase / 100,  // format persen di Excel
          r.persentase >= 75 ? 'Lulus' : 'Tidak Lulus'
        ]);

        const allRows = [...infoRows, tableHeader, ...tableRows];
        const ws = XLSX.utils.aoa_to_sheet(allRows);

        /* Styling: lebar kolom */
        ws['!cols'] = [
          { wch: 4  },   // No
          { wch: 32 },   // Nama
          { wch: 14 },   // NIM
          { wch: 7  },   // Hadir
          { wch: 7  },   // Sakit
          { wch: 7  },   // Izin
          { wch: 7  },   // Alfa
          { wch: 10 },   // Jaga
          { wch: 14 },   // Total Tidak Hadir
          { wch: 13 },   // Total Pertemuan
          { wch: 11 },   // %
          { wch: 12 },   // Keterangan
        ];

        // Format kolom % sebagai persen di Excel
        const pctColIndex = 10; // kolom K (0-based)
        const startDataRow = infoRows.length + 1; // 1-based di xlsx
        for (let row = startDataRow + 1; row <= startDataRow + tableRows.length; row++) {
          const cellAddr = XLSX.utils.encode_cell({ r: row, c: pctColIndex });
          if (ws[cellAddr]) {
            ws[cellAddr].z = '0%';
          }
        }

        XLSX.utils.book_append_sheet(wb, ws, 'Rekap Absensi');

        const filename = `rekap-absensi-${currentMkNama.replace(/\s+/g, '-').toLowerCase()}-${new Date().toISOString().split('T')[0]}.xlsx`;
        XLSX.writeFile(wb, filename);

        showToast('success', 'File berhasil diunduh', filename);
      } catch(e) {
        console.error('exportExcel error:', e);
        showToast('error', 'Gagal export Excel', e.message);
      }
    };

    loadFilter();
  </script>
</body>
</html>
