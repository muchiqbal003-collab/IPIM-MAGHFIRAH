<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Rekap Absensi Kelas - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9;
      --gold: #d4a843; --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5;
      --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333;
      --radius-sm: 8px; --radius: 12px; --transition: all 0.25s ease;
      --header-height: 56px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); }
    .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
    .app-header h3 { font-size: 16px; font-weight: 600; }
    .content { padding: 16px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 16px; border: 1px solid var(--gray-200); margin-bottom: 16px; overflow-x: auto; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--gray-600); display: block; margin-bottom: 4px; }
    .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Poppins', sans-serif; outline: none; background: white; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { background: var(--gray-100); padding: 8px 6px; text-align: center; font-size: 10px; font-weight: 700; color: var(--gray-600); border-bottom: 2px solid var(--gray-200); white-space: nowrap; }
    td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--gray-100); }
    .badge { padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600; }
    .badge-green { background: var(--green-light); color: #1b5e20; }
    .badge-red { background: #fce4ec; color: #b71c1c; }
    .badge-yellow { background: #fdf6e3; color: #8d6e00; }
  </style>
</head>
<body>

<header class="app-header">
  <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <h3>Rekap Absensi Kelas</h3>
</header>

<div class="content">
  <div class="card">
    <div class="form-group"><label>Pilih Matakuliah</label><select id="filterMatkul" onchange="loadRekap()"><option value="">Pilih Matakuliah...</option></select></div>
  </div>
  <div class="card" id="tableContainer"><p style="text-align:center;color:var(--gray-600);">Pilih matakuliah</p></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../../js/firebase-config.js"></script>
<script src="../../js/app.js"></script>
<script>
  const user = checkRole(['dosen', 'dosen-musyrif']);
  if (!user) window.location.href = '../../index.html';

  async function loadFilter() {
    const snap = await db.collection('jadwal').where('dosenId','==',user.uid).get();
    const sel = document.getElementById('filterMatkul');
    const ids = new Set(snap.docs.map(d => d.data().mkId));
    for (const id of ids) {
      const doc = await db.collection('matakuliah').doc(id).get();
      if (doc.exists) { const o = document.createElement('option'); o.value = id; o.textContent = doc.data().nama; sel.appendChild(o); }
    }
  }

  window.loadRekap = async function() {
    const mkId = document.getElementById('filterMatkul').value;
    if (!mkId) return;
    const container = document.getElementById('tableContainer');
    try {
      // 1. Ambil total pertemuan dari jadwal
      const jadwalSnap = await db.collection('jadwal').where('dosenId','==',user.uid).where('mkId','==',mkId).get();
      let totalPertemuan = 16; // default
      if (!jadwalSnap.empty) {
        totalPertemuan = jadwalSnap.docs[0].data().totalPertemuan || 16;
      }

      // 2. Ambil data absensi
      const absenSnap = await db.collection('absensi').where('dosenId','==',user.uid).get();
      const filtered = absenSnap.docs.filter(d => d.data().mapelId === mkId || d.data().mkId === mkId);
      
      // 3. Hitung rekap per mahasiswa
      const rekap = {};
      filtered.forEach(d => {
        const data = d.data();
        const mhsId = data.mahasiswaId || data.santriId;
        if (!mhsId) return;
        if (!rekap[mhsId]) rekap[mhsId] = { sakit:0, izin:0, alfa:0, jaga:0 };
        if (data.status !== 'hadir') {
          rekap[mhsId][data.status] = (rekap[mhsId][data.status] || 0) + 1;
        }
      });

      // 4. Hitung hadir = total pertemuan - total tidak hadir
      const arr = [];
      for (const [id, val] of Object.entries(rekap)) {
        const mhsDoc = await db.collection('mahasiswa').doc(id).get();
        const nama = mhsDoc.exists ? mhsDoc.data().nama : id;
        const totalTidakHadir = val.sakit + val.izin + val.alfa + val.jaga;
        const hadir = totalPertemuan - totalTidakHadir;
        const persentase = totalPertemuan > 0 ? Math.round((hadir / totalPertemuan) * 100) : 0;
        arr.push({ nama, hadir, ...val, totalTidakHadir, totalPertemuan, persentase });
      }
      arr.sort((a,b) => a.nama.localeCompare(b.nama));

      let html = '<table><thead><tr><th>No</th><th>Nama</th><th>Hadir</th><th>Sakit</th><th>Izin</th><th>Alfa</th><th>Jaga</th><th>Total Tidak Hadir</th><th>Total Pertemuan</th><th>Persentase</th></tr></thead><tbody>';
      if (arr.length === 0) html += '<tr><td colspan="10">Tidak ada data</td></tr>';
      else arr.forEach((r, i) => {
        const badge = r.persentase >= 75 ? 'badge-green' : r.persentase >= 50 ? 'badge-yellow' : 'badge-red';
        html += `<tr><td>${i+1}</td><td style="text-align:left;">${r.nama}</td><td>${r.hadir}</td><td>${r.sakit}</td><td>${r.izin}</td><td>${r.alfa}</td><td>${r.jaga||0}</td><td>${r.totalTidakHadir}</td><td>${r.totalPertemuan}</td><td><span class="badge ${badge}">${r.persentase}%</span></td></tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    } catch(e) { container.innerHTML = '<p style="color:red;">Gagal memuat data</p>'; }
  };

  loadFilter();
</script>
</body>
</html>
