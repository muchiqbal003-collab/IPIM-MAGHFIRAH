<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Anggota Halaqohku - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9; --gold: #d4a843; --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333; --radius-sm: 8px; --radius: 12px; --transition: all 0.25s ease; --header-height: 56px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); }
    .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
    .content { padding: 16px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 16px; border: 1px solid var(--gray-200); margin-bottom: 16px; }
    .info-row { display: flex; align-items: center; padding: 12px; background: var(--gray-50); border-radius: var(--radius-sm); margin-bottom: 8px; }
    .info-row .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; color: var(--green-dark); font-weight: 700; font-size: 16px; margin-right: 12px; }
    .info-row .detail { flex: 1; }
    .info-row .detail strong { display: block; font-size: 14px; }
    .info-row .detail span { font-size: 11px; color: var(--gray-600); }
    .empty-state { text-align: center; padding: 30px; color: var(--gray-600); }
    .empty-state i { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.5; }
    .warning-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: var(--radius-sm); padding: 16px; text-align: center; color: #856404; }
  </style>
</head>
<body>
  <header class="app-header">
    <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <h3>Anggota Halaqohku</h3>
  </header>

  <div class="content" id="mainContent">
    <p style="text-align:center;color:var(--gray-600);">Memuat data...</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['musyrif', 'dosen-musyrif']);
    if (!user) window.location.href = '../../index.html';

    async function loadAnggota() {
      const container = document.getElementById('mainContent');
      container.innerHTML = '<p style="text-align:center;color:var(--gray-600);">Mencari halaqoh Anda...</p>';

      try {
        // DEBUG: Cetak UID user
        console.log('DEBUG - UID user:', user.uid);
        console.log('DEBUG - Role user:', user.role);
        console.log('DEBUG - Nama user:', user.nama);

        // 1. Cari halaqoh yang dimiliki user ini (berdasarkan UID)
        console.log('DEBUG - Query halaqoh dengan musyrifId:', user.uid);
        let hSnap = await db.collection('halaqoh').where('musyrifId', '==', user.uid).get();
        console.log('DEBUG - Hasil query (musyrifId):', hSnap.size, 'dokumen');

        if (hSnap.empty) {
          console.log('DEBUG - Mencoba query dengan userId:', user.uid);
          hSnap = await db.collection('halaqoh').where('userId', '==', user.uid).get();
          console.log('DEBUG - Hasil query (userId):', hSnap.size, 'dokumen');
        }

        if (hSnap.empty) {
          // DEBUG: Cetak semua halaqoh untuk perbandingan
          const allHalaqoh = await db.collection('halaqoh').get();
          console.log('DEBUG - Total semua halaqoh:', allHalaqoh.size);
          allHalaqoh.forEach(doc => {
            const data = doc.data();
            console.log('DEBUG - Halaqoh:', doc.id, 'musyrifId:', data.musyrifId, 'userId:', data.userId, 'nama:', data.nama);
          });

          container.innerHTML = `
            <div class="warning-box">
              <i class="fa-solid fa-circle-exclamation" style="font-size:30px; display:block; margin-bottom:10px;"></i>
              <strong>Anda belum memiliki Halaqoh.</strong>
              <p style="margin-top:8px; font-size:13px;">Silakan hubungi Operator Halaqoh untuk mendaftarkan Anda ke dalam kelompok Halaqoh.</p>
              <p style="margin-top:4px; font-size:11px;">UID Anda: ${user.uid}</p>
              <p style="margin-top:4px; font-size:11px;">Cek Console (F12) untuk detail debug</p>
            </div>`;
          return;
        }

        // 2. Ambil data halaqoh pertama yang ditemukan
        const halaqohData = hSnap.docs[0].data();
        const halaqohId = hSnap.docs[0].id;
        console.log('DEBUG - Halaqoh ditemukan:', halaqohData.nama, 'ID:', halaqohId);

        // 3. Ambil daftar anggota halaqoh ini
        const anggotaSnap = await db.collection('pembagianHalaqoh').where('halaqohId', '==', halaqohId).get();
        console.log('DEBUG - Jumlah anggota:', anggotaSnap.size);
        
        if (anggotaSnap.empty) {
          container.innerHTML = `
            <div class="card">
              <h3 style="margin-bottom:12px;">🕌 ${halaqohData.nama}</h3>
              <p style="color:var(--gray-600);">Musyrif: ${halaqohData.musyrifNama || 'Anda'}</p>
            </div>
            <div class="empty-state">
              <i class="fa-solid fa-user-slash"></i>
              <p>Halaqoh ini belum memiliki anggota</p>
              <p style="font-size:11px;">Hubungi Operator Halaqoh untuk menambahkan mahasiswa</p>
            </div>`;
          return;
        }

        // 4. Ambil detail mahasiswa
        const mahasiswaIds = anggotaSnap.docs.map(d => d.data().mahasiswaId);
        const mhsList = [];
        for (const id of mahasiswaIds) {
          const mhsDoc = await db.collection('mahasiswa').doc(id).get();
          if (mhsDoc.exists) {
            mhsList.push({ id, ...mhsDoc.data() });
          }
        }

        // 5. Render
        let html = `
          <div class="card">
            <h3 style="margin-bottom:8px;">🕌 ${halaqohData.nama}</h3>
            <p style="color:var(--gray-600); font-size:13px;">Musyrif: ${halaqohData.musyrifNama || 'Anda'} | Anggota: ${mhsList.length} orang</p>
          </div>
          <div class="card">
            <h4 style="margin-bottom:12px;">📋 Daftar Anggota</h4>`;

        mhsList.sort((a, b) => (a.nama || '').localeCompare(b.nama || '')).forEach(mhs => {
          const initial = (mhs.nama || '?')[0].toUpperCase();
          html += `
            <div class="info-row">
              <div class="avatar">${initial}</div>
              <div class="detail">
                <strong>${mhs.nama || '-'}</strong>
                <span>NIM: ${mhs.nim || '-'}</span>
              </div>
            </div>`;
        });

        html += '</div>';
        container.innerHTML = html;

      } catch (error) {
        console.error('DEBUG - Error:', error);
        container.innerHTML = `<div class="warning-box">
          <strong>Gagal memuat data</strong>
          <p style="margin-top:8px; font-size:13px;">${error.message}</p>
        </div>`;
      }
    }

    loadAnggota();
  </script>
</body>
</html>
