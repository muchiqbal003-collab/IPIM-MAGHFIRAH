<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Notifikasi - IPIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9; --gold: #d4a843; --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333; --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --transition: all 0.25s ease; --header-height: 56px; --bottom-nav-height: 64px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); padding-bottom: var(--bottom-nav-height); }
    .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
    .app-header h3 { font-size: 16px; font-weight: 600; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height); background: var(--white); border-top: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-around; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--gray-600); cursor: pointer; text-decoration: none; }
    .bottom-nav .nav-item i { font-size: 20px; }
    .bottom-nav .nav-item.active { color: var(--green-dark); font-weight: 600; }
    .content { padding: 16px; }
    .notification-list { display: flex; flex-direction: column; gap: 12px; }
    .notif-card { background: var(--white); border-radius: var(--radius-lg); padding: 14px; border: 1px solid var(--gray-200); transition: var(--transition); cursor: pointer; position: relative; }
    .notif-card.unread { border-left: 4px solid var(--green); }
    .notif-card .notif-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .notif-card .notif-body { font-size: 12px; color: var(--gray-600); margin-bottom: 6px; }
    .notif-card .notif-time { font-size: 10px; color: var(--gray-600); }
    .mark-read-btn { background: none; border: none; color: var(--green); font-size: 12px; font-weight: 600; cursor: pointer; position: absolute; right: 12px; top: 12px; }
    .empty-state { text-align: center; padding: 40px; color: var(--gray-600); }
    .empty-state i { font-size: 48px; display: block; margin-bottom: 12px; }
  </style>
</head>
<body>
  <header class="app-header">
    <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <h3>Notifikasi</h3>
  </header>
  <div class="content">
    <div class="notification-list" id="notifList">
      <p style="text-align:center;color:var(--gray-600);">Memuat...</p>
    </div>
  </div>
  <nav class="bottom-nav">
    <div class="nav-item" onclick="goTo('dashboard.html')"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item" onclick="goTo('kalender.html')"><i class="fa-solid fa-calendar-days"></i><span>Kalender</span></div>
    <div class="nav-item" onclick="goTo('menu-cepat.html')"><i class="fa-solid fa-grid-2"></i><span>Menu</span></div>
    <div class="nav-item" onclick="goTo('rekap.html')"><i class="fa-solid fa-chart-bar"></i><span>Rekap</span></div>
    <div class="nav-item active" onclick="goTo('profil.html')"><i class="fa-solid fa-user"></i><span>Profil</span></div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['dosen', 'musyrif', 'dosen-musyrif', 'umum']);
    if (!user) window.location.href = '../../index.html';
    window.goTo = page => window.location.href = page;

    async function loadNotifikasi() {
      const container = document.getElementById('notifList');
      try {
        const snapUser = await db.collection('notifikasi').where('targetUserId', '==', user.uid).get();
        const snapRole = await db.collection('notifikasi').where('targetRole', '==', user.role).get();

        const allNotif = [...snapUser.docs, ...snapRole.docs]
          .filter((doc, index, self) => index === self.findIndex(d => d.id === doc.id))
          .sort((a, b) => (b.data().createdAt?.toMillis?.() || 0) - (a.data().createdAt?.toMillis?.() || 0));

        if (allNotif.length === 0) {
          container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-bell-slash"></i>Belum ada notifikasi</div>';
          return;
        }
        container.innerHTML = allNotif.map(doc => {
          const data = doc.data();
          const time = data.createdAt ? new Date(data.createdAt.toMillis()).toLocaleString('id-ID') : '';
          const isUnread = !data.dibaca;
          return `<div class="notif-card ${isUnread ? 'unread' : ''}">
            <div class="notif-title">${data.judul || 'Notifikasi'}</div>
            <div class="notif-body">${data.pesan || ''}</div>
            <div class="notif-time">${time}</div>
            ${isUnread ? `<button class="mark-read-btn" onclick="event.stopPropagation();markAsRead('${doc.id}')">Tandai Dibaca</button>` : ''}
          </div>`;
        }).join('');
      } catch(e) {
        container.innerHTML = '<p style="text-align:center;color:red;">Gagal memuat notifikasi: ' + e.message + '</p>';
      }
    }

    window.markAsRead = async function(id) {
      await db.collection('notifikasi').doc(id).update({ dibaca: true });
      loadNotifikasi();
    };

    loadNotifikasi();
  </script>
</body>
</html>
