<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>IPIM - Jadwal Sholat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --green-dark: #003d33; --green-mid: #006644; --green: #00a859;
      --green-light: #e8f5e9; --green-pale: #f0faf5;
      --gold: #f5c842;
      --white: #ffffff; --gray-100: #f0f0f0; --gray-200: #d1ead8;
      --gray-600: #666666; --gray-800: #222222;
      --radius-sm: 10px; --radius: 14px; --radius-lg: 18px;
      --transition: all 0.3s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--green-pale); color: var(--gray-800);
      padding-bottom: 30px;
    }

    .topbar {
      background: linear-gradient(135deg, #003d33 0%, #006644 100%);
      color: white; padding: 14px 16px 20px;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 4px 16px rgba(0,61,51,0.25);
    }
    .topbar-row { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18);
      color: white; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; flex-shrink: 0;
    }
    .topbar-title { font-size: 16px; font-weight: 700; }
    .topbar-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; display: flex; align-items: center; gap: 5px; }

    .main { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    .now-card {
      background: linear-gradient(135deg, #003d33, #006644);
      border-radius: var(--radius-lg); padding: 18px; color: #fff; position: relative;
    }
    .now-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .now-lbl { font-size: 11px; opacity: 0.75; }
    .now-name { font-size: 26px; font-weight: 800; margin-top: 3px; }
    .now-time { font-size: 14px; opacity: 0.85; margin-top: 3px; }
    .now-icon { width: 46px; height: 46px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gold); }
    .countdown { margin-top: 14px; background: rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 14px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
    .countdown b { font-size: 15px; }

    .card { background: var(--white); border-radius: var(--radius-lg); padding: 15px; border: 0.5px solid var(--gray-200); }
    .card-title { font-size: 13px; font-weight: 700; color: var(--green-dark); margin-bottom: 13px; display: flex; align-items: center; gap: 7px; }
    .card-title i { font-size: 15px; color: var(--green); }

    .jadwal-grid { display: flex; flex-direction: column; gap: 0; }
    .jadwal-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 4px; border-bottom: 0.5px solid var(--gray-100);
    }
    .jadwal-row:last-child { border-bottom: none; }
    .jadwal-row.lewat { opacity: 0.45; }
    .jadwal-row.aktif { background: var(--green-light); border-radius: var(--radius-sm); padding: 13px 10px; margin: 0 -6px; }
    .jr-left { display: flex; align-items: center; gap: 12px; }
    .jr-icon { width: 38px; height: 38px; border-radius: 50%; background: var(--green-pale); display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--green-mid); }
    .jadwal-row.aktif .jr-icon { background: var(--green); color: white; }
    .jr-name { font-size: 13px; font-weight: 700; color: var(--gray-800); }
    .jr-name-ar { font-size: 11px; color: var(--gray-600); margin-top: 1px; }
    .jr-time { font-size: 16px; font-weight: 800; color: var(--green-dark); }
    .jr-status { font-size: 10px; color: var(--green-mid); font-weight: 600; margin-top: 2px; text-align: right; }

    .loading-state, .error-state { text-align: center; padding: 30px 16px; color: var(--gray-600); font-size: 12px; }
    .error-state i { font-size: 24px; color: var(--gold); margin-bottom: 8px; display: block; }
    .retry-btn { margin-top: 12px; background: var(--green-mid); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-size: 12px; font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer; }

    .info-banner { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; background: #e6f1fb; border-radius: 10px; font-size: 11px; color: #0c447c; line-height: 1.5; }
    .info-banner i { font-size: 14px; margin-top: 1px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-row">
      <div class="back-btn" onclick="goTo('dashboard.html')"><i class="fa-solid fa-arrow-left"></i></div>
      <div>
        <div class="topbar-title"><i class="fa-solid fa-mosque"></i> Jadwal Sholat</div>
        <div class="topbar-sub"><i class="fa-solid fa-location-dot"></i> <span id="lokasiText">Mendeteksi lokasi...</span></div>
      </div>
    </div>
  </div>

  <div class="main" id="mainContent">
    <div class="loading-state" id="loadingState">
      <i class="fa-solid fa-circle-notch fa-spin" style="font-size:22px;color:var(--green);"></i>
      <p style="margin-top:10px;">Memuat jadwal sholat...</p>
    </div>
  </div>

  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const user = checkRole(['dosen', 'musyrif', 'dosen-musyrif', 'umum']);
    if (!user) window.location.href = '../../index.html';
    window.goTo = page => window.location.href = page;

    const PRAYER_NAMES = {
      Fajr:    { id: 'Subuh',  ar: 'الفجر',    icon: 'fa-cloud-sun' },
      Sunrise: { id: 'Terbit', ar: 'الشروق',   icon: 'fa-sun' },
      Dhuhr:   { id: 'Dzuhur', ar: 'الظهر',    icon: 'fa-sun' },
      Asr:     { id: 'Ashar',  ar: 'العصر',    icon: 'fa-cloud-sun' },
      Maghrib: { id: 'Maghrib',ar: 'المغرب',   icon: 'fa-moon' },
      Isha:    { id: 'Isya',   ar: 'العشاء',   icon: 'fa-moon' }
    };
    const ORDER = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];

    function cacheKey(lat, lon, dateStr) {
      return `jadwalSholat_${lat.toFixed(2)}_${lon.toFixed(2)}_${dateStr}`;
    }

    function getTodayStr() {
      const d = new Date();
      return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
    }

    async function fetchJadwal(lat, lon) {
      const dateStr = getTodayStr();
      const key = cacheKey(lat, lon, dateStr);
      try {
        const cached = localStorage.getItem(key);
        if (cached) return JSON.parse(cached);
      } catch(e) {}

      const url = `https://api.aladhan.com/v1/timings/${dateStr}?latitude=${lat}&longitude=${lon}&method=20`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Gagal mengambil jadwal sholat');
      const data = await res.json();
      const timings = data.data.timings;

      try { localStorage.setItem(key, JSON.stringify(timings)); } catch(e) {}
      return timings;
    }

    function parseTimeToday(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      const d = new Date();
      d.setHours(h, m, 0, 0);
      return d;
    }

    function renderJadwal(timings, lokasiLabel) {
      const now = new Date();
      const schedule = ORDER.map(key => ({
        key,
        ...PRAYER_NAMES[key],
        time: timings[key],
        dateObj: parseTimeToday(timings[key])
      }));

      let activeIdx = schedule.findIndex(s => s.dateObj > now);
      if (activeIdx === -1) activeIdx = 0;

      const active = schedule[activeIdx];
      const diffMs = activeIdx === 0 && active.dateObj < now
        ? (active.dateObj.getTime() + 86400000) - now.getTime()
        : active.dateObj.getTime() - now.getTime();
      const diffH = Math.floor(diffMs / 3600000);
      const diffM = Math.floor((diffMs % 3600000) / 60000);

      const rows = schedule.map((s, idx) => {
        const isPast = idx < activeIdx;
        const isActive = idx === activeIdx;
        return `
          <div class="jadwal-row ${isPast ? 'lewat' : ''} ${isActive ? 'aktif' : ''}">
            <div class="jr-left">
              <div class="jr-icon"><i class="fa-solid ${s.icon}"></i></div>
              <div>
                <div class="jr-name">${s.id}</div>
                <div class="jr-name-ar">${s.ar}</div>
              </div>
            </div>
            <div style="text-align:right;">
              <div class="jr-time">${s.time}</div>
              <div class="jr-status">${isPast ? 'Sudah lewat' : isActive ? 'Selanjutnya' : ''}</div>
            </div>
          </div>`;
      }).join('');

      document.getElementById('mainContent').innerHTML = `
        <div class="now-card">
          <div class="now-top">
            <div>
              <div class="now-lbl">Waktu sholat saat ini</div>
              <div class="now-name">${active.id}</div>
              <div class="now-time">${active.time} WIB</div>
            </div>
            <div class="now-icon"><i class="fa-solid ${active.icon}"></i></div>
          </div>
          <div class="countdown">
            <span>Menuju waktu ${active.id}</span>
            <b>${diffH}j ${diffM}m</b>
          </div>
        </div>

        <div class="card">
          <div class="card-title"><i class="fa-solid fa-list"></i> Semua Jadwal Hari Ini</div>
          <div class="jadwal-grid">${rows}</div>
        </div>

        <div class="info-banner">
          <i class="fa-solid fa-circle-info"></i>
          <span>Jadwal dihitung otomatis berdasarkan lokasi GPS kamu (${lokasiLabel}) menggunakan metode Kementerian Agama RI. Jadwal disimpan sementara di perangkat agar lebih cepat dimuat.</span>
        </div>
      `;
    }

    function renderError(message) {
      document.getElementById('mainContent').innerHTML = `
        <div class="card">
          <div class="error-state">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <p>${message}</p>
            <button class="retry-btn" onclick="initJadwal()">Coba Lagi</button>
          </div>
        </div>`;
    }

    async function reverseGeocodeLabel(lat, lon) {
      try {
        const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=id`);
        const data = await res.json();
        return data.city || data.locality || data.principalSubdivision || 'Lokasi kamu';
      } catch(e) {
        return 'Lokasi kamu';
      }
    }

    async function initJadwal() {
      document.getElementById('mainContent').innerHTML = `
        <div class="loading-state">
          <i class="fa-solid fa-circle-notch fa-spin" style="font-size:22px;color:var(--green);"></i>
          <p style="margin-top:10px;">Memuat jadwal sholat...</p>
        </div>`;

      if (!navigator.geolocation) {
        document.getElementById('lokasiText').textContent = 'Lokasi tidak didukung';
        renderError('Browser kamu tidak mendukung deteksi lokasi. Coba gunakan browser lain.');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          try {
            const [timings, label] = await Promise.all([
              fetchJadwal(lat, lon),
              reverseGeocodeLabel(lat, lon)
            ]);
            document.getElementById('lokasiText').textContent = label;
            renderJadwal(timings, label);
          } catch(e) {
            renderError('Gagal memuat jadwal sholat. Periksa koneksi internet kamu.');
          }
        },
        () => {
          document.getElementById('lokasiText').textContent = 'Izin lokasi ditolak';
          renderError('Aktifkan izin lokasi di browser untuk melihat jadwal sholat sesuai posisi kamu.');
        },
        { timeout: 10000 }
      );
    }

    initJadwal();
  </script>
</body>
</html>
