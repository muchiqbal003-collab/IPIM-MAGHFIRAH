<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kalender Akademik - IPIM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --green-dark: #004d40; --green: #00a859; --green-light: #e8f5e9;
            --gold: #d4a843; --gold-light: #fdf6e3;
            --white: #ffffff; --gray-50: #fafafa; --gray-100: #f5f5f5;
            --gray-200: #e0e0e0; --gray-600: #616161; --gray-800: #333333;
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px;
            --transition: all 0.25s ease;
            --bottom-nav-height: 64px; --header-height: 56px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-800); padding-top: var(--header-height); padding-bottom: var(--bottom-nav-height); }

        .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-dark); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .app-header .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .app-header h3 { font-size: 16px; font-weight: 600; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height); background: var(--white); border-top: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-around; z-index: 100; }
        .bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: var(--gray-600); cursor: pointer; text-decoration: none; padding: 6px 0; }
        .bottom-nav .nav-item i { font-size: 20px; }
        .bottom-nav .nav-item.active { color: var(--green-dark); font-weight: 600; }

        .content { padding: 16px; }
        .card { background: var(--white); border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--gray-200); margin-bottom: 16px; }

        .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .calendar-header h2 { font-size: 16px; font-weight: 700; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
        .calendar-grid .day-name { font-size: 10px; font-weight: 700; color: var(--gray-600); padding: 4px 0; }
        .calendar-grid .day { padding: 8px 2px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; position: relative; }
        .calendar-grid .day.today { background: var(--green-light); font-weight: 700; }
        .calendar-grid .day.selected { background: var(--green-dark); color: white; }
        .calendar-grid .day.has-event::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }

        .event-list { display: flex; flex-direction: column; gap: 6px; }
        .event-item { padding: 8px 12px; background: var(--gray-50); border-radius: var(--radius-sm); font-size: 12px; }
        .event-item .title { font-weight: 600; }
        .event-item .desc { font-size: 11px; color: var(--gray-600); }

        .btn { padding: 8px 12px; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; background: var(--gray-100); }
        .btn-primary { background: var(--green-dark); color: white; }
    </style>
</head>
<body>

    <header class="app-header">
        <button class="btn-back" onclick="goTo('dashboard.html')"><i class="fa-solid fa-arrow-left"></i></button>
        <h3>Kalender Akademik</h3>
        <button class="btn btn-sm" onclick="shareKalender()"><i class="fa-solid fa-share-nodes"></i> Bagikan</button>
    </header>

    <div class="content">
        <div class="card">
            <div class="calendar-header">
                <button class="btn btn-sm" onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 id="monthLabel">Januari 2026</h2>
                <button class="btn btn-sm" onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="card">
            <h4 style="margin-bottom:8px;" id="selectedDateLabel">📅 Event Hari Ini</h4>
            <div class="event-list" id="eventList"><p style="color:var(--gray-600);">Pilih tanggal</p></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="goTo('dashboard.html')"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item" onclick="goTo('kalender.html')"><i class="fa-solid fa-calendar-days"></i><span>Kalender</span></div>
        <div class="nav-item active" onclick="goTo('menu-cepat.html')"><i class="fa-solid fa-bolt"></i><span>Menu</span></div>
        <div class="nav-item" onclick="goTo('rekap.html')"><i class="fa-solid fa-chart-bar"></i><span>Rekap</span></div>
        <div class="nav-item" onclick="goTo('profil.html')"><i class="fa-solid fa-user"></i><span>Profil</span></div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="../../js/firebase-config.js"></script>
    <script src="../../js/app.js"></script>
    <script>
        const user = checkRole(['dosen', 'musyrif', 'dosen-musyrif', 'umum']);
        if (!user) window.location.href = '../../index.html';
        window.goTo = page => window.location.href = page;

        let currentDate = new Date();
        let events = [];
        let selectedDate = new Date().toISOString().split('T')[0];

        async function loadEvents() {
            try {
                const snap = await db.collection('kalenderAkademik').get();
                events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderCalendar();
                loadEventsByDate(selectedDate);
            } catch(e) { console.error(e); }
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            document.getElementById('monthLabel').textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date().toISOString().split('T')[0];
            const dayNames = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
            let html = dayNames.map(d => `<div class="day-name">${d}</div>`).join('');
            for (let i = 0; i < firstDay; i++) html += '<div class="day"></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = dateStr === today;
                const isSelected = dateStr === selectedDate;
                const hasEvent = events.some(e => e.tanggal === dateStr);
                html += `<div class="day ${isToday?'today':''} ${isSelected?'selected':''} ${hasEvent?'has-event':''}" onclick="selectDate('${dateStr}')">${d}</div>`;
            }
            document.getElementById('calendarGrid').innerHTML = html;
        }

        window.changeMonth = function(delta) { currentDate.setMonth(currentDate.getMonth() + delta); renderCalendar(); };

        window.selectDate = function(dateStr) {
            selectedDate = dateStr;
            document.getElementById('selectedDateLabel').textContent = `📅 Event ${formatDate(dateStr)}`;
            renderCalendar();
            loadEventsByDate(dateStr);
        };

        function loadEventsByDate(dateStr) {
            const filtered = events.filter(e => e.tanggal === dateStr);
            const list = document.getElementById('eventList');
            list.innerHTML = filtered.length === 0 ? '<p style="color:var(--gray-600);">Tidak ada event</p>' : filtered.map(e => `<div class="event-item"><div class="title">${e.judul}</div><div class="desc">${e.deskripsi||''}</div></div>`).join('');
        }

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
            return `${d} ${months[parseInt(m)-1]} ${y}`;
        }

        // ========== FITUR BAGIKAN ==========
        async function shareKalender() {
            if (events.length === 0) {
                alert('Belum ada event untuk dibagikan.');
                return;
            }

            // Urutkan event berdasarkan tanggal
            const sorted = [...events].sort((a, b) => (a.tanggal || '').localeCompare(b.tanggal || ''));

            // Buat teks yang rapi
            let text = '📅 *KALENDER AKADEMIK IPIM*\n';
            text += '━━━━━━━━━━━━━━━━\n\n';

            sorted.forEach(event => {
                const tanggal = formatDate(event.tanggal);
                text += `📌 *${tanggal}*\n`;
                text += `   📖 ${event.judul}\n`;
                if (event.deskripsi) {
                    text += `   📝 ${event.deskripsi}\n`;
                }
                text += '\n';
            });

            text += '━━━━━━━━━━━━━━━━\n';
            text += '© IPIM Maghfirah';

            // Coba gunakan Web Share API jika di HP
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Kalender Akademik IPIM',
                        text: text,
                    });
                } catch (err) {
                    console.log('Share dibatalkan atau gagal:', err);
                }
            } else {
                // Fallback: buka WhatsApp Web dengan teks
                const encodedText = encodeURIComponent(text);
                window.open(`https://wa.me/?text=${encodedText}`, '_blank');
            }
        }

        loadEvents();
    </script>
</body>
</html>
