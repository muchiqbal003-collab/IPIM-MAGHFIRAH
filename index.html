<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPIM - Institute Pendidikan Islam Maghfirah</title>

  <meta name="theme-color" content="#004d40">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IPIM">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo-placeholder"><i class="fa-solid fa-graduation-cap"></i></div>
        <h1>IPIM</h1>
        <p>Institute Pendidikan Islam Maghfirah</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="nama@ipim.ac.id" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label for="password">Kata Sandi</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="Masukkan kata sandi" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <span class="spinner"></span><span class="btn-text">Masuk</span>
        </button>
      </form>

      <div class="message-box" id="messageBox"></div>
      <div class="login-footer"><p>&copy; 2026 IPIM Maghfirah • Sistem Informasi Terpadu</p></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(r => console.log('SW registered')).catch(e => console.log('SW failed'));
      });
    }
  </script>
</body>
</html>
